# ============================================================
# TAK Pipeline - Lobby Server Values (On-Prem k3s)
# ============================================================
# NeoForge (84 mod) → Paper に変換
# Velocity(GCE) → Tailscale → onprem svc-lobby (25566/TCP)
#
# デプロイ方法:
#   helm upgrade lobby ./charts/minecraft \
#     -f values-lobby.yaml \
#     -n minecraft
# ============================================================

server:
  name: "lobby"
  type: "PAPER"
  version: "1.21.1"
  memory: "4G"
  memoryRequest: "3Gi"
  memoryLimit: "4Gi"
  cpuRequest: "500m"
  cpuLimit: "1000m"
  jvmOpts: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
  onlineMode: "FALSE"
  port: 25566
  mods:
    - "multiverse-core"     # Modrinth: Multiverse Core (Paper 対応)
    - "multiverse-portals"  # Modrinth: Multiverse Portals (Paper 対応)
  extraEnv:
    - name: DIFFICULTY
      value: "peaceful"
    - name: GAMEMODE
      value: "adventure"
    - name: SPAWN_PROTECTION
      value: "0"
    - name: MAX_PLAYERS
      value: "100"
    - name: MODRINTH_ALLOWED_VERSION_TYPE
      value: "alpha"
    - name: MODRINTH_DOWNLOAD_DEPENDENCIES
      value: "REQUIRED"

network:
  nodePort: 30067
  serviceType: "NodePort"
  port: 25566

storage:
  size: "5Gi"

metrics:
  enabled: true
  port: 8080

velocity:
  enabled: true
