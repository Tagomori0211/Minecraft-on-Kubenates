# ============================================================
# Survival 統合サーバー (Survival + Industry 統合 / Lobby 廃止)
# ============================================================
# 旧: Survival (16Gi) + Industry (30Gi) + Lobby (8Gi) の3サーバー構成
# 新: Survival 統合 (30Gi) 単一サーバー
#
# 【MODバージョン管理方針】(2026-06-01 ピン留め)
#   - 全MODを Modrinth の exact version ID でピン留め (slug:versionId)
#   - MODRINTH_DOWNLOAD_DEPENDENCIES=none で依存自動DLを無効化しドリフトを排除
#   - サーバーの実jar(80個)と完全一致。クライアント配布は ModList/mrpack/sushiJava-2.0.0.mrpack
#   - MODを変更する際は本リストを更新し、必ず mrpack を再生成すること
#
# デプロイ方法:
#   helm upgrade --install survival ./minecraft-server -f values-survival.yaml -n minecraft
# ============================================================

server:
  name: "survival"
  type: "NEOFORGE"
  version: "1.21.1"
  neoforgeVersion: "21.1.228"
  memory: "30G"
  memoryRequest: "29Gi"
