# ============================================================
# Survival 統合サーバー (Survival + Industry 統合 / Lobby 廃止)
# ============================================================
# 旧: Survival (16Gi) + Industry (30Gi) + Lobby (8Gi) の3サーバー構成
# 新: Survival 統合 (30Gi) 単一サーバー
#
# 変更点:
#   - メモリ: 16G → 30G (Industryの割当を継承)
#   - CPU: 2000m → 4000m (Industryの割当を継承)
#   - JVM: IndustryのG1GC 30GBヒープ用チューニングに統一
#   - playersync: 削除 (単一サーバーで不要)
#   - extraConfigMaps: 削除 (playersync ConfigMap参照のため不要)
#   - LEVEL_SEED: 削除 (ランダムシードで新規ワールド生成)
#   - velocity.enabled: false (Lobby廃止に伴い直結)
#   - MODs: Survival + Industryの共通MOD + chart defaults軽量MODを統合
#   - ストレージ: 30Gi (Industryの容量を継承)
#
# デプロイ方法:
#   helm upgrade --install survival ./minecraft-server -f values-survival.yaml -n minecraft
# ============================================================

server:
  name: "survival"
  type: "NEOFORGE"
  version: "1.21.1"
  neoforgeVersion: "21.1.228"
  memory: "30G"
  memoryRequest: "29Gi"
  memoryLimit: "30Gi"
  cpuRequest: "4000m"
  cpuLimit: "4000m"
  jvmOpts: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=32M -XX:G1ReservePercent=20 -XX:+UnlockExperimentalVMOptions -XX:G1MixedGCCountTarget=4 -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40"
  onlineMode: "FALSE"
  mods:
    # --- 工業ディメンション用（World Portal + vanilla datapack方式に変更）---
    # World Portal は CF_PROJECTS または mods に追加（schema 確認後）
    # --- YUNG's Better シリーズ ---
    - "yungs-api"
    - "terrablender"
    - "architectury-api"
    - "geckolib"
    - "yungs-better-nether-fortresses"
    - "yungs-better-dungeons"
    - "yungs-better-jungle-temples"
    - "yungs-better-ocean-monuments"
    - "yungs-better-mineshafts"
    - "yungs-better-end-island"
    - "yungs-better-strongholds"
    - "yungs-better-witch-huts"
    - "yungs-better-desert-temples"
    - "yungs-extras"
    - "yungs-better-caves"
    - "yungs-cave-biomes"
    # --- Farmer's Delight + アドオン ---
    - "farmers-delight"
    - "sophisticated-backpacks"
    - "sophisticated-core"
    - "waystones"
    - "handcrafted"
    - "resourceful-lib"
    - "chipped"
    - "torchmaster"
    - "aquaculture"
    - "aquaculture-delight"
    - "ends-delight"
    - "expanded-delight"
    - "my-nethers-delight"
    - "more-delight"
    - "brewin-and-chewin"
    - "crabbers-delight"
    - "rustic-delight"
    - "trailtales-delight"
    - "cultural-delights"
    # --- Mekanism + AE2 工業系 ---
    - "mekanism"
    - "mekanism-additions"
    - "mekanism-generators"
    - "mekanism-tools"
    - "trash-cans"
    - "ae2"
    - "applied-energistics-2-wireless-terminals"
    - "applied-mekanistics"
    - "botany-pots"
    - "botany-trees"
    - "mekanismmoremachine"
    - "mekanism-lasers:r5nDcriB"
    - "mekanism_extra"
    - "evolved-mekanism"
    # --- ユーティリティ ---
    - "cosmetic-armor-reworked-forked"
    - "carry-on"
    - "gravestone-mod"
    # --- クライアント系軽量MOD (chart defaultsより追加) ---
    - "journeymap"
    - "emi"
    - "jade"
    - "appleskin"
    - "embeddium"
    - "modernfix"
    - "neat"
    - "trashslot"
    - "balm"
    - "leaves-be-gone"
    - "puzzles-lib"
    - "netherportalfix"
    - "liteminer"
    - "amber"
    - "connected-glass"
    - "ferrite-core"
  extraEnv:
    - name: MODRINTH_ALLOWED_VERSION_TYPE
      value: "alpha"
    - name: MODRINTH_DOWNLOAD_DEPENDENCIES
      value: "REQUIRED"
    - name: CF_PROJECTS
      value: "306345,246763,1205026" # 306345=TerraBlender / 246763=CF版ライブラリ(GeckoLibではない、実CF ID=388172) / 1205026=World Portal
    - name: MODS
      value: "https://www.curseforge.com/api/v1/mods/227639/files/7797302/download"
    - name: CF_DOWNLOAD_DEPENDENCIES
      value: "REQUIRED"
    - name: CF_ALLOWED_VERSION_TYPE
      value: "alpha"

network:
  nodePort: 30065
  serviceType: "NodePort"
  port: 25565

storage:
  size: "30Gi"

metrics:
  enabled: true
  port: 8080

velocity:
  enabled: false