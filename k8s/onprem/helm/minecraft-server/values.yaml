# Default values for minecraft-server.

server:
  name: "survival"
  type: "NEOFORGE"
  version: "1.21.1"
  neoforgeVersion: "21.1.228" # Set specific version or "latest"
  memory: "16G"
  memoryRequest: "16Gi"
  memoryLimit: "16Gi"
  cpuRequest: "2000m"
  cpuLimit: "2000m"
  jvmOpts: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=16M -XX:G1ReservePercent=20"
  onlineMode: "FALSE"
  mods:
    - "journeymap"
    - "emi"
    - "jade"
    - "appleskin"
    - "embeddium"
    - "cosmetic-armor-reworked-forked"
    - "modernfix"
    - "neat"
    - "trashslot"
    - "balm"
    - "leaves-be-gone"
    - "puzzles-lib"
    - "netherportalfix"
    - "gravestone-mod"
    - "liteminer"
    - "amber"
    - "carry-on"
    - "connected-glass"
    - "ferrite-core"
  extraEnv: []

  # SPIGET_RESOURCES: SpigotMC のリソース ID（Paper サーバー用プラグイン）
  # 例: ["390", "391"]  # 390=Multiverse Core, 391=Multiverse Portals
  plugins: []

  # 追加 ConfigMap のマウント設定（mod config ファイル注入等）
  # 例:
  #   - name: "lobby-playersync-cm"
  #     mountPath: "/data/config/playersync.toml"
  #     subPath: "playersync.toml"
  extraConfigMaps: []

network:
  nodePort: 30065
  serviceType: "NodePort"
  port: 25565

storage:
  size: "20Gi"

metrics:
  enabled: true
  port: 8080

logShipper:
  enabled: true

velocity:
  enabled: false
  secretName: "velocity-secret"
  secretKey: "velocity-forwarding-secret"
