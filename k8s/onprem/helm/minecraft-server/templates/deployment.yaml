apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-{{ .Values.server.name }}
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: minecraft-java
    app.kubernetes.io/component: {{ .Values.server.name }}
    app.kubernetes.io/managed-by: helm
    env: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-{{ .Values.server.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mc-{{ .Values.server.name }}
        app.kubernetes.io/component: {{ .Values.server.name }}
      annotations:
        prometheus.io/scrape: "{{ .Values.metrics.enabled }}"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120
{{- if or .Values.velocity.enabled .Values.server.extraConfigMaps }}
      initContainers:
{{- if .Values.velocity.enabled }}
        - name: inject-velocity-secret
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo -n "${VELOCITY_SECRET}" > /data/forwarding.secret
              echo -n "${VELOCITY_SECRET}" > /data/velocity.secret
              {{- if eq .Values.server.type "PAPER" }}
              mkdir -p /data/config
              if [ ! -f /data/config/paper-global.yml ]; then
                printf 'proxies:\n  bungee-cord:\n    online-mode: true\n  proxy-protocol: false\n  velocity:\n    enabled: true\n    online-mode: true\n    secret: "%s"\n' "${VELOCITY_SECRET}" > /data/config/paper-global.yml
              else
                sed -i 's/enabled: false/enabled: true/g' /data/config/paper-global.yml
                sed -i "s|    secret:.*|    secret: ${VELOCITY_SECRET}|g" /data/config/paper-global.yml
              fi
              {{- end }}
          env:
            - name: VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.velocity.secretName }}
                  key: {{ .Values.velocity.secretKey }}
          volumeMounts:
            - name: data
              mountPath: /data
{{- end }}
{{- if .Values.server.extraConfigMaps }}
        - name: copy-extra-configs
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /data/config
              {{- range .Values.server.extraConfigMaps }}
              cp /cm-staging-{{ .name }}/{{ .subPath }} {{ .mountPath }}
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- range .Values.server.extraConfigMaps }}
            - name: cm-{{ .name }}
              mountPath: /cm-staging-{{ .name }}
            {{- end }}
{{- end }}
{{- end }}
      containers:
        - name: minecraft
          image: itzg/minecraft-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TYPE, value: "{{ .Values.server.type }}" }
            - { name: VERSION, value: "{{ .Values.server.version }}" }
{{- if eq .Values.server.type "NEOFORGE" }}
            - { name: NEOFORGE_VERSION, value: "{{ .Values.server.neoforgeVersion }}" }
{{- end }}
            - { name: SERVER_PORT, value: "{{ .Values.network.port }}" }
            - { name: MEMORY, value: "{{ .Values.server.memory }}" }
            - { name: ONLINE_MODE, value: "{{ .Values.server.onlineMode }}" }
            - { name: ENABLE_QUERY, value: "true" }
            - { name: TZ, value: "Asia/Tokyo" }
            - name: JVM_XX_OPTS
              value: "{{ .Values.server.jvmOpts }}"
{{- if and (ne .Values.server.type "PAPER") .Values.velocity.enabled }}
            - name: MODRINTH_PROJECTS
              value: {{ (concat (list "neoforged-velocity-support") (default (list) .Values.server.mods)) | join "," | quote }}
{{- else if and (ne .Values.server.type "PAPER") .Values.server.mods }}
            - name: MODRINTH_PROJECTS
              value: {{ .Values.server.mods | join "," | quote }}
{{- else if and (eq .Values.server.type "PAPER") .Values.server.mods }}
            - name: MODRINTH_PROJECTS
              value: {{ .Values.server.mods | join "," | quote }}
{{- end }}
{{- if and (eq .Values.server.type "PAPER") .Values.velocity.enabled }}
            - { name: PAPER_VELOCITY_PROXY, value: "TRUE" }
{{- end }}
{{- if .Values.server.plugins }}
            - name: SPIGET_RESOURCES
              value: {{ .Values.server.plugins | join "," | quote }}
{{- end }}
{{- with .Values.server.extraEnv }}
{{ toYaml . | nindent 12 }}
{{- end }}
          ports:
            - containerPort: {{ .Values.network.port }}
              name: minecraft
          volumeMounts:
            - mountPath: /data
              name: data
          resources:
            requests:
              memory: "{{ .Values.server.memoryRequest }}"
              cpu: "{{ .Values.server.cpuRequest }}"
            limits:
              memory: "{{ .Values.server.memoryLimit }}"
              cpu: "{{ .Values.server.cpuLimit }}"
          startupProbe:
            tcpSocket: { port: {{ .Values.network.port }} }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            tcpSocket: { port: {{ .Values.network.port }} }
            periodSeconds: 60
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mc-health"]
            initialDelaySeconds: 60
            periodSeconds: 15
{{- if .Values.metrics.enabled }}
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:{{ .Values.network.port }}" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }
{{- end }}
{{- if .Values.logShipper.enabled }}
        - name: log-shipper
          image: python:3.12-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              pip install --quiet google-cloud-pubsub 2>&1 | grep -v "^Requirement already satisfied"
              exec python3 /scripts/ship_java_logs.py
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: vector-gcp-credentials
                  key: project-id
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcs-key.json
            - name: SERVER_NAME
              value: "{{ .Values.server.name }}"
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: gcp-credentials
              mountPath: /secrets
              readOnly: true
            - name: shipper-data
              mountPath: /tmp/shipper-data
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
{{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-{{ .Values.server.name }}
{{- range .Values.server.extraConfigMaps }}
        - name: cm-{{ .name }}
          configMap:
            name: {{ .name }}
{{- end }}
{{- if .Values.logShipper.enabled }}
        - name: script
          configMap:
            name: java-log-shipper-cm
        - name: gcp-credentials
          secret:
            secretName: vector-gcp-credentials
            items:
              - key: key.json
                path: gcs-key.json
        - name: shipper-data
          emptyDir: {}
{{- end }}
