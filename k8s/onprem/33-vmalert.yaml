# ============================================================
# TAK Pipeline - vmalert (Recording Rules / Downsampling)
# ============================================================
# vmalert が 15 分間隔で recording rules を評価し、
# ダウンサンプリング済みメトリクスを VictoriaMetrics に書き戻す。
#
# データフロー:
#   vmagent (1s scrape) → VictoriaMetrics (raw)
#                               ↑ read (PromQL)
#                      vmalert (15m 評価)
#                               ↓ write (remote_write)
#                        VictoriaMetrics (mc:*:*15m 系列)
#
# task3 BigQuery INSERT のデータソース:
#   mc:players_online:avg15m / mc:tps:avg15m / mc:jvm_memory_used_bytes:avg15m
# ============================================================

# ============================================================
# Recording Rules ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-recording-rules-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmalert"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
data:
  rules.yaml: |-
    groups:
      # ── 15 分刻みダウンサンプリング（BQ 投入用）──────────────
      # interval: 15m → vmalert がこのグループを 15 分ごとに評価する。
      # [15m] レンジは評価時点から過去 15 分のウィンドウ。
      # 元メトリクスの全 label（component, location 等）が引き継がれるため
      # BQ の server カラム = component label (lobby/survival/mod/bedrock) に対応する。
      - name: minecraft_15m
        interval: 15m
        rules:
          # ── プレイヤー数 ─────────────────────────────────────
          - record: mc:players_online:avg15m
            expr: avg_over_time(mc_players_online_count[15m])

          # ピーク接続数（ゲームイベント・混雑分析用）
          - record: mc:players_online:max15m
            expr: max_over_time(mc_players_online_count[15m])

          # ── TPS (Ticks Per Second) ───────────────────────────
          # NOTE: Bedrock モードの mc-monitor は mc_tps を公開しない場合がある。
          #       その場合 bedrock 系列は NoData になる（BQ テーブルは NULL 許容で設計）。
          - record: mc:tps:avg15m
            expr: avg_over_time(mc_tps[15m])

          # 瞬間ラグ検知用（最小 TPS）
          - record: mc:tps:min15m
            expr: min_over_time(mc_tps[15m])

          # ── JVM メモリ ───────────────────────────────────────
          # type="used" のみ抽出。max / free は必要時に追加する。
          - record: mc:jvm_memory_used_bytes:avg15m
            expr: avg_over_time(mc_jvm_memory_bytes{type="used"}[15m])

---
# ============================================================
# vmalert Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmalert"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "vmalert"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "vmalert"
        app.kubernetes.io/component: "monitoring"
        env: "prod"
    spec:
      serviceAccountName: vm-sa
      nodeSelector:
        node-role.kubernetes.io/monitoring: "true"
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:latest
          args:
            - "-datasource.url=http://victoria-metrics-service:8428"
            - "-remoteWrite.url=http://victoria-metrics-service:8428/api/v1/write"
            # recording rules 専用インスタンスのため 15m をグローバル設定
            - "-evaluationInterval=15m"
            - "-rule=/etc/vmalert/rules.yaml"
            - "-httpListenAddr=:8880"
            - "-loggerLevel=INFO"
          ports:
            - containerPort: 8880
              name: http
          volumeMounts:
            - name: vmalert-rules
              mountPath: /etc/vmalert/
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8880
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8880
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: vmalert-rules
          configMap:
            name: vmalert-recording-rules-cm

---
# ============================================================
# vmalert Service (ClusterIP)
# ============================================================
# /api/v1/rules, /api/v1/alerts, /health エンドポイントを公開。
# Grafana からルール確認や、将来の alertmanager 統合に利用可能。
apiVersion: v1
kind: Service
metadata:
  name: vmalert-service
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmalert"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  selector:
    app.kubernetes.io/name: "vmalert"
  type: ClusterIP
  ports:
    - port: 8880
      targetPort: 8880
      name: http
