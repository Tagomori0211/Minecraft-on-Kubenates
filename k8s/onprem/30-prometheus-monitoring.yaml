# ============================================================
# TAK Pipeline - Monitoring Stack (On-Premise k3s)
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "monitoring-prometheus"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"

---
# ============================================================
# Prometheus Storage (PVC)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage-pvc
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "prometheus"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
# ============================================================
# Prometheus ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "prometheus"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
data:
  prometheus.yml: |-
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus-alerts/alerts.yml"

    scrape_configs:
      # ── GKE 内サービス（Tailscale経由でアクセス） ──────────────────
      - job_name: 'velocity'
        static_configs:
          - targets: ['100.83.131.107:30080']
            labels: { location: gke, component: velocity }

      # ── オンプレミス MinecraftServer（直接ClusterIP / サービス名）
      - job_name: 'lobby'
        static_configs:
          - targets: ['svc-lobby.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: lobby }

      - job_name: 'survival'
        static_configs:
          - targets: ['svc-survival.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: survival }

      - job_name: 'mod'
        static_configs:
          - targets: ['svc-mod.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: mod }

      - job_name: 'bedrock'
        static_configs:
          - targets: ['svc-bedrock.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: bedrock }

      # ── Kubernetes Nodes (Kubelet / cAdvisor) ──────────────────
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true # Self-signed certs in home lab
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - target_label: location
            replacement: onprem

      # ── GKE (Cloud) Nodes ──────────────────
      - job_name: 'gke-cadvisor'
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /etc/prometheus-secrets/gke-token
        static_configs:
          - targets: ['100.83.131.107:10250'] # GKE Node Tailscale IP
            labels: { location: gke, component: nodes }
        metrics_path: /metrics/cadvisor

---
# ============================================================
# Prometheus Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-server
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "prometheus"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "prometheus"
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "prometheus"
    spec:
      serviceAccountName: prometheus-sa
      nodeSelector:
        node-role.kubernetes.io/monitoring: "true"
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/
            - name: prometheus-storage
              mountPath: /prometheus/
            - name: gke-token
              mountPath: /etc/prometheus-secrets/
              readOnly: true
            - name: prometheus-alerts
              mountPath: /etc/prometheus-alerts/
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1Gi", cpu: "1000m" }
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-server-cm
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-storage-pvc
        - name: gke-token
          secret:
            secretName: gke-monitoring-token
            items:
              - key: token
                path: gke-token
        - name: prometheus-alerts
          configMap:
            name: prometheus-alerts-cm

---
# ============================================================
# Grafana Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "grafana"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "grafana"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "grafana"
    spec:
      nodeSelector:
        node-role.kubernetes.io/monitoring: "true"
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin" # 必要に応じてSecret化
            - name: GF_SERVER_ROOT_URL
              value: "http://tak-grafana-onprem"
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi", cpu: "500m" }

---
# ============================================================
# Services
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring-prometheus
spec:
  selector:
    app.kubernetes.io/name: "prometheus"
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring-prometheus
spec:
  selector:
    app.kubernetes.io/name: "grafana"
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
