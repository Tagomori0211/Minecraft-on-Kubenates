# ============================================================
# TAK Pipeline - StatusPlatform (AppServer k3s)
# ============================================================
# sushiski Status Platform
#   コンポーネント:
#     - Kotlin API    : Ktor + gRPC Server（メトリクス集計・加工）
#     - Flutter Web   : gRPC-Web Client（マイクラライクUI）
#     - Envoy Proxy   : gRPC-Web → gRPC 変換
#     - CF Tunnel     : Cloudflare Tunnel（外部HTTPS公開）
#
# アクセスフロー:
#   User → HTTPS → CF Tunnel → Flutter Web
#                              Flutter Web → gRPC-Web → Envoy → Kotlin API
#                              Kotlin API  → PromQL    → Prometheus(GKE)
#
# 参照: infrastructure.mermaid (AppServer subgraph)
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: status
  labels:
    app.kubernetes.io/part-of: tak-pipeline
    location: onprem-appserver

---
# ============================================================
# Kotlin API (Ktor + gRPC Server)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kotlin-api
  namespace: status
  labels:
    app: kotlin-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kotlin-api
  template:
    metadata:
      labels:
        app: kotlin-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kotlin-api
          # TODO: 実際のイメージビルド後に置換
          # image: ghcr.io/tagomori1102/sushiski-kotlin-api:latest
          image: eclipse-temurin:21-jre
          command: ["sh", "-c", "echo 'Kotlin API placeholder - replace with actual image'; sleep infinity"]
          env:
            # Prometheus (GKE) への接続
            # Tailscale経由でGKEのPrometheusにアクセス
            - name: PROMETHEUS_URL
              value: "http://100.64.0.1:9090"  # TODO: tak-prometheus-gke Tailscale IP
            - name: GRPC_PORT
              value: "9090"
            - name: HTTP_PORT
              value: "8080"
          ports:
            - containerPort: 9090
              name: grpc
              protocol: TCP
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi", cpu: "1000m" }
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: kotlin-api
  namespace: status
  labels:
    app: kotlin-api
    app.kubernetes.io/component: api
spec:
  selector:
    app: kotlin-api
  type: ClusterIP
  ports:
    - port: 9090
      name: grpc
    - port: 8080
      name: http

---
# ============================================================
# Envoy Proxy (gRPC-Web → gRPC 変換)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: status
  labels:
    app.kubernetes.io/part-of: tak-pipeline
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_grpc_web
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    codec_type: AUTO
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: kotlin_api_grpc
                                timeout: 0s
                                max_stream_duration:
                                  grpc_timeout_header_max: 0s
                          cors:
                            allow_origin_string_match:
                              - prefix: "*"
                            allow_methods: GET, PUT, DELETE, POST, OPTIONS
                            allow_headers: keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout
                            max_age: "1728000"
                            expose_headers: custom-header-1,grpc-status,grpc-message
                    http_filters:
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: kotlin_api_grpc
          connect_timeout: 0.25s
          type: LOGICAL_DNS
          http2_protocol_options: {}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: kotlin_api_grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: kotlin-api
                          port_value: 9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: status
  labels:
    app: envoy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
        app.kubernetes.io/component: proxy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
          ports:
            - containerPort: 8080
              name: grpc-web
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "500m" }
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config

---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: status
  labels:
    app: envoy
    app.kubernetes.io/component: proxy
spec:
  selector:
    app: envoy
  type: ClusterIP
  ports:
    - port: 8080
      name: grpc-web

---
# ============================================================
# Flutter Web (gRPC-Web Client / マイクラライクUI)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flutter-web
  namespace: status
  labels:
    app: flutter-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flutter-web
  template:
    metadata:
      labels:
        app: flutter-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: flutter-web
          # TODO: 実際のFlutter Webビルドイメージに置換
          # image: ghcr.io/tagomori1102/sushiski-flutter-web:latest
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: flutter-web
  namespace: status
  labels:
    app: flutter-web
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: flutter-web
  type: ClusterIP
  ports:
    - port: 80
      name: http

---
# ============================================================
# Cloudflare Tunnel
# ============================================================
# User → HTTPS → CF Tunnel → Flutter Web (ルーティング)
# 設定: Cloudflare Zero Trustダッシュボードでトンネルを作成し
#       TUNNEL_TOKEN を Secret に設定すること
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-tunnel
  namespace: status
  labels:
    app: cloudflare-tunnel
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-tunnel
  template:
    metadata:
      labels:
        app: cloudflare-tunnel
        app.kubernetes.io/component: ingress
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel-secret
                  key: tunnel-token
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
