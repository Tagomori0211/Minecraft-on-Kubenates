apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "prometheus"
    app.kubernetes.io/component: "monitoring"
data:
  alerts.yml: |-
    groups:
      - name: MemoryOverloadAlerts
        rules:
          # クラスター全体 (ノード) のメモリが85%を超えた場合
          - alert: ClusterMemoryHigh
            expr: sum(container_memory_usage_bytes{location="onprem", id="/"}) / (64 * 1024 * 1024 * 1024) > 0.85
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "High Memory Usage across On-Premises Cluster (> 85%)"
              description: "The on-premise Host memory consumption is currently at {{ $value | humanizePercentage }} (based on 64GiB constraint). Immediate action may be required to prevent OOM Killer."
          
          # 単一のPodが異常にメモリを占有している場合 (16GB以上を5分間)
          - alert: IndividualPodHighMemoryAnomaly
            expr: sum(container_memory_usage_bytes{location="onprem", container!=""}) by (pod) > (16 * 1024 * 1024 * 1024)
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "A Pod is consuming extreme amounts of Memory (> 16GiB)"
              description: "Pod {{ $labels.pod }} is consuming {{ $value | humanize1024 }} bytes. This exceeds standard safe thresholds for single JVMs in this cluster, except potentially Mod servers."
          
          # GKEクラスター全体 (ノード) のメモリが85%を超えた場合 (e2-medium = 4GB 基準)
          - alert: GKEClusterMemoryHigh
            expr: sum(container_memory_usage_bytes{location="gke", id="/"}) / (4 * 1024 * 1024 * 1024) > 0.85
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "High Memory Usage across GKE Cluster (> 85%)"
              description: "The GKE host memory consumption is currently at {{ $value | humanizePercentage }} (based on 4GiB constraint). Immediate action may be required to prevent OOM Killer."
