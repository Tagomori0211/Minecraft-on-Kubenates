# ============================================================
# TAK Pipeline - Backend Servers (MinecraftServer k3s)
# ============================================================
# オンプレ MinecraftServer ノードに展開するリソース
#
# コンポーネント (infrastructure.mermaid):
#   Java-Survival      : Paper Survival (4GB)
#   Java-Indicatory MOD: NeoForge MOD (8GB)
#   Bedrock Server     : Bedrock Edition (2GB)
#   Tailscale Client   : Subnet Router (GKE ↔ オンプレ VPN)
#
# 接続フロー:
#   Velocity(GKE) → Tailscale → svc-survival / svc-mod
#   Nginx(さくらVPS) → Tailscale → svc-bedrock
#   Prometheus(GKE) → Tailscale → mc-monitor(:8080) 各Pod
# ============================================================

# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
  labels:
    app.kubernetes.io/part-of: tak-pipeline
    location: onprem-minecraft-server

---
# ── Paper-Velocity 設定テンプレート ──────────────────────────
# Survival / Lobby などの Paper サーバーに注入する
# Velocity forwarding secret 設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: paper-velocity-config
  namespace: minecraft
  labels:
    app.kubernetes.io/part-of: tak-pipeline
data:
  paper-global.yml.template: |
    proxies:
      velocity:
        enabled: true
        online-mode: true
        secret: "__VELOCITY_SECRET__"

---
# ============================================================
# 1. Java-Survival (4GB / Paper)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-survival
  namespace: minecraft
  labels:
    app.kubernetes.io/component: survival
    app.kubernetes.io/part-of: tak-pipeline
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-survival
  namespace: minecraft
  labels:
    app.kubernetes.io/component: survival
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-survival
  template:
    metadata:
      labels:
        app: mc-survival
        app.kubernetes.io/component: survival
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Velocity secret を paper-global.yml に注入
      initContainers:
        - name: inject-velocity-secret
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /data/config
              sed "s/__VELOCITY_SECRET__/${VELOCITY_SECRET}/g" \
                /template/paper-global.yml.template > /data/config/paper-global.yml
          env:
            - name: VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-secret
                  key: velocity-forwarding-secret
          volumeMounts:
            - name: velocity-template
              mountPath: /template
              readOnly: true
            - name: data
              mountPath: /data

      containers:
        # ── Survival サーバー本体 ─────────────────────────────
        - name: minecraft
          image: itzg/minecraft-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TYPE, value: "PAPER" }
            - { name: VERSION, value: "1.21.4" }
            - { name: MEMORY, value: "16G" }
            - { name: ONLINE_MODE, value: "FALSE" }
            - { name: ENABLE_QUERY, value: "true" }
            - { name: TZ, value: "Asia/Tokyo" }
            - name: JVM_XX_OPTS
              value: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=16M -XX:G1ReservePercent=20"
          ports:
            - containerPort: 25565
              name: minecraft
          volumeMounts:
            - mountPath: /data
              name: data
          resources:
            requests: { memory: "16Gi", cpu: "2000m" }
            limits: { memory: "16Gi", cpu: "2000m" }
          startupProbe:
            tcpSocket: { port: 25565 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: 25565 }
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mc-health"]
            initialDelaySeconds: 60
            periodSeconds: 10

        # ── mc-monitor（Prometheus Exporter）──────────────────
        # Prometheus -->|監視| Java_Survival (infrastructure.mermaid)
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:25565" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-survival
        - name: velocity-template
          configMap:
            name: paper-velocity-config

---
apiVersion: v1
kind: Service
metadata:
  name: svc-survival
  namespace: minecraft
  labels:
    app.kubernetes.io/component: survival
    app.kubernetes.io/part-of: tak-pipeline
spec:
  selector:
    app: mc-survival
  type: ClusterIP
  ports:
    - port: 25565
      name: minecraft
    - port: 8080
      name: metrics

---
# ============================================================
# 2. Java-Indicatory MOD (8GB / NeoForge)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-mod
  namespace: minecraft
  labels:
    app.kubernetes.io/component: mod
    app.kubernetes.io/part-of: tak-pipeline
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-mod
  namespace: minecraft
  labels:
    app.kubernetes.io/component: mod
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-mod
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mc-mod
        app.kubernetes.io/component: mod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        # ── MOD サーバー本体（NeoForge）──────────────────────
        - name: minecraft
          image: itzg/minecraft-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TYPE, value: "NEOFORGE" }
            - { name: VERSION, value: "1.20.4" }
            - { name: NEOFORGE_VERSION, value: "20.4.237" }
            - { name: MEMORY, value: "30G" }
            - { name: ONLINE_MODE, value: "FALSE" }
            - { name: ENABLE_QUERY, value: "true" }
            - { name: MAX_TICK_TIME, value: "120000" }
            - { name: VIEW_DISTANCE, value: "8" }
            - { name: SIMULATION_DISTANCE, value: "6" }
            - { name: TZ, value: "Asia/Tokyo" }
            - name: JVM_XX_OPTS
              value: >-
                -XX:+UseG1GC
                -XX:+ParallelRefProcEnabled
                -XX:MaxGCPauseMillis=200
                -XX:G1HeapRegionSize=32M
                -XX:G1ReservePercent=20
                -XX:+UnlockExperimentalVMOptions
                -XX:G1MixedGCCountTarget=4
                -XX:G1NewSizePercent=30
                -XX:G1MaxNewSizePercent=40
          ports:
            - containerPort: 25565
              name: minecraft
          volumeMounts:
            - mountPath: /data
              name: data
          resources:
            requests: { memory: "30Gi", cpu: "4000m" }
            limits: { memory: "30Gi", cpu: "4000m" }
          startupProbe:
            tcpSocket: { port: 25565 }
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            tcpSocket: { port: 25565 }
            periodSeconds: 60
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mc-health"]
            initialDelaySeconds: 180
            periodSeconds: 15

        # ── mc-monitor（Prometheus Exporter）──────────────────
        # Prometheus -->|監視| Java_Mod (infrastructure.mermaid)
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:25565" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-mod

---
apiVersion: v1
kind: Service
metadata:
  name: svc-mod
  namespace: minecraft
  labels:
    app.kubernetes.io/component: mod
    app.kubernetes.io/part-of: tak-pipeline
spec:
  selector:
    app: mc-mod
  type: ClusterIP
  ports:
    - port: 25565
      name: minecraft
    - port: 8080
      name: metrics

---
# ============================================================
# 3. Bedrock Server (2GB)
# ============================================================
# さくらVPS Nginx(UDP Proxy) → Tailscale → このサーバー
# Nginx_Sakura --> TS_Router_Sub -->|転送| Bedrock_Server
# (infrastructure.mermaid)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-bedrock
  namespace: minecraft
  labels:
    app.kubernetes.io/component: bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bedrock
  namespace: minecraft
  labels:
    app.kubernetes.io/component: bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-bedrock
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mc-bedrock
        app.kubernetes.io/component: bedrock
      annotations:
        # mc-monitor が :8080 でメトリクスを公開する（19132/UDP ではない）
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        # ── Bedrock サーバー本体 ──────────────────────────────
        - name: bedrock
          image: itzg/minecraft-bedrock-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TZ, value: "Asia/Tokyo" }
            - { name: ONLINE_MODE, value: "false" }
            - { name: SERVER_NAME, value: "Sushi.ski-Server" }
            - { name: GAMEMODE, value: "survival" }
            - { name: FORCE_GAMEMODE, value: "true" }
            - { name: DIFFICULTY, value: "easy" }
            - { name: ALLOW_CHEATS, value: "true" }
            - { name: MAX_PLAYERS, value: "25" }
            - { name: ALLOW_LIST, value: "false" }
            - { name: VIEW_DISTANCE, value: "48" }
            - { name: TICK_DISTANCE, value: "8" }
            - { name: PLAYER_IDLE_TIMEOUT, value: "30" }
            - { name: RAKNET_FORCE_MTU, value: "1200" }
          ports:
            - containerPort: 19132
              name: bedrock
              protocol: UDP
          volumeMounts:
            - mountPath: /data
              name: data
          resources:
            requests: { memory: "4Gi", cpu: "4" }
            limits: { memory: "8Gi", cpu: "8" }
        # Probes removed due to missing mc-monitor binary in bedrock image

        # ── mc-monitor（Prometheus Exporter / Bedrock対応）────
        # Prometheus -->|監視| Bedrock_Server (infrastructure.mermaid)
        # --edition bedrock で UDP 19132 に問い合わせてメトリクスを :8080 で公開
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_BEDROCK_SERVERS, value: "localhost:19132" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-bedrock

---
apiVersion: v1
kind: Service
metadata:
  name: svc-bedrock
  namespace: minecraft
  labels:
    app.kubernetes.io/component: bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  selector:
    app: mc-bedrock
  type: ClusterIP
  ports:
    - port: 19132
      name: bedrock
      protocol: UDP
    - port: 8080
      name: metrics

---
# ============================================================
# 4. Tailscale Subnet Router
# ============================================================
# TS_Router_Sub (infrastructure.mermaid)
# 役割:
#   - GKE Velocity → オンプレ Survival / Mod へのルーティング
#   - Prometheus(GKE) → オンプレ mc-monitor メトリクス収集
#   - さくらVPS → Bedrock Server への UDP 転送
#   - k3s Service CIDR (10.43.0.0/16) を Tailscale に広告
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-tailscale-state
  namespace: minecraft
  labels:
    app.kubernetes.io/component: tailscale-router
    app.kubernetes.io/part-of: tak-pipeline
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-subnet-router
  namespace: minecraft
  labels:
    app: tailscale-router
    app.kubernetes.io/component: tailscale-router
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-router
  template:
    metadata:
      labels:
        app: tailscale-router
    spec:
      containers:
        - name: tailscale
          image: tailscale/tailscale:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            - name: TS_HOSTNAME
              value: "tak-onprem-k8s-router"
            # k3s Service CIDR を Tailscale ネットワークに広告
            - name: TS_ROUTES
              value: "10.43.0.0/16"
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }

      volumes:
        # PVC で状態永続化（Pod再起動時も再認証不要）
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: pvc-tailscale-state
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
