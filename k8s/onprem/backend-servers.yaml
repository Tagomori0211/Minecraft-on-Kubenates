# ============================================================
# TAK Pipeline - Backend Servers (MinecraftServer k3s)
# ============================================================
# オンプレ MinecraftServer ノードに展開するリソース
#
# コンポーネント:
#   Survival 統合サーバー (Helm Chart 管理 / values-survival.yaml)
#   Bedrock Server        : Bedrock Edition (4-8Gi)
#
# 接続フロー:
#   Java    : GCE socat-tcp(:25565) → Tailscale → svc-survival:30065
#   Bedrock : GCE socat-bedrock(:19132) → Tailscale → svc-bedrock:19132
#   Prometheus → Tailscale → mc-monitor(:8080) 各Pod
# ============================================================

# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
  labels:
    app.kubernetes.io/part-of: tak-pipeline
    location: onprem-minecraft-server

---
# ── Paper-Velocity 設定テンプレート ──────────────────────────
# Velocity forwarding secret 設定（Paper サーバー用 / 現在未使用）
apiVersion: v1
kind: ConfigMap
metadata:
  name: paper-velocity-config
  namespace: minecraft
  labels:
    app.kubernetes.io/part-of: tak-pipeline
data:
  paper-global.yml.template: |
    proxies:
      velocity:
        enabled: true
        online-mode: true
        secret: "__VELOCITY_SECRET__"

---
# Java サーバー (Survival 統合) は Helm Chart で管理

---
# ============================================================
# 3. Bedrock Server (2GB)
# ============================================================
# さくらVPS Nginx(UDP Proxy) → Tailscale → このサーバー
# Nginx_Sakura --> TS_Router_Sub -->|転送| Bedrock_Server
# (infrastructure.mermaid)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-bedrock
  namespace: minecraft
  labels:
    app.kubernetes.io/component: bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-bedrock
  namespace: minecraft
  labels:
    app.kubernetes.io/component: bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-bedrock
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mc-bedrock
        app.kubernetes.io/component: bedrock
      annotations:
        # mc-monitor が :8080 でメトリクスを公開する（19132/UDP ではない）
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        # ── Bedrock サーバー本体 ──────────────────────────────
        - name: bedrock
          image: itzg/minecraft-bedrock-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TZ, value: "Asia/Tokyo" }
            - { name: ONLINE_MODE, value: "false" }
            - { name: SERVER_NAME, value: "Sushi.ski-Server" }
            - { name: GAMEMODE, value: "survival" }
            - { name: FORCE_GAMEMODE, value: "true" }
            - { name: DIFFICULTY, value: "easy" }
            - { name: ALLOW_CHEATS, value: "true" }
            - { name: MAX_PLAYERS, value: "25" }
            - { name: ALLOW_LIST, value: "false" }
            - { name: VIEW_DISTANCE, value: "48" }
            - { name: TICK_DISTANCE, value: "8" }
            - { name: PLAYER_IDLE_TIMEOUT, value: "30" }
            - { name: RAKNET_FORCE_MTU, value: "1200" }
            - { name: DISABLE_CLIENT_VIBRANT_VISUALS, value: "false" }
          ports:
            - containerPort: 19132
              hostPort: 19132
              name: bedrock
              protocol: UDP
          volumeMounts:
            - mountPath: /data
              name: data
          resources:
            requests: { memory: "4Gi", cpu: "4" }
            limits: { memory: "8Gi", cpu: "8" }
        # Probes removed due to missing mc-monitor binary in bedrock image

        # ── mc-monitor（Prometheus Exporter / Bedrock対応）────
        # Prometheus -->|監視| Bedrock_Server (infrastructure.mermaid)
        # --edition bedrock で UDP 19132 に問い合わせてメトリクスを :8080 で公開
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_BEDROCK_SERVERS, value: "127.0.0.1:19132" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-bedrock

---
apiVersion: v1
kind: Service
metadata:
  name: svc-bedrock
  namespace: minecraft
  labels:
    app.kubernetes.io/component: bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  selector:
    app: mc-bedrock
  type: ClusterIP
  ports:
    - port: 19132
      name: bedrock
      protocol: UDP
    - port: 8080
      name: metrics
