apiVersion: v1
kind: ServiceAccount
metadata:
  name: bedrock-backup-sa
  namespace: minecraft
  labels:
    app.kubernetes.io/name: bedrock-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bedrock-backup-role
  namespace: minecraft
  labels:
    app.kubernetes.io/name: bedrock-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create", "exec", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bedrock-backup-rolebinding
  namespace: minecraft
  labels:
    app.kubernetes.io/name: bedrock-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bedrock-backup-role
subjects:
  - kind: ServiceAccount
    name: bedrock-backup-sa
    namespace: minecraft
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bedrock-backup-script-cm
  namespace: minecraft
  labels:
    app.kubernetes.io/name: bedrock-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
data:
  backup.sh: |
    #!/bin/sh
    set -e
    
    NAMESPACE="minecraft"
    DEPLOYMENT_NAME="deploy-bedrock"
    
    # 失敗時に必ずスケールアップを試みるトラップ
    trap 'echo "⚠️ エラーが発生しました。サーバーの復旧を試みます..."; kubectl scale deployment ${DEPLOYMENT_NAME} -n ${NAMESPACE} --replicas=1 || true' ERR EXIT
    
    echo "⬇️ Installing kubectl and mc..."
    apk add --no-cache curl > /dev/null
    curl -L -s -O "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    chmod +x kubectl
    mv kubectl /usr/local/bin/
    
    curl -L -s -o mc https://dl.min.io/client/mc/release/linux-amd64/mc
    chmod +x mc
    mv mc /usr/local/bin/
    
    # Podとコンテナが実行中になるまで待機する関数
    wait_for_pod() {
      echo "🔎 Bedrock PodがReadyになるのを待機中..."
      kubectl wait --for=condition=Ready pod -l app.kubernetes.io/component=bedrock -n ${NAMESPACE} --timeout=60s
      POD_NAME=$(kubectl get pods -n ${NAMESPACE} -l app.kubernetes.io/component=bedrock -o jsonpath='{.items[0].metadata.name}')
      echo "✅ Pod特定: ${POD_NAME}"
    }
    
    # 1. アナウンスシーケンス
    wait_for_pod
    echo "📢 メンテナンス開始アナウンス..."
    kubectl exec -n ${NAMESPACE} ${POD_NAME} -c bedrock -- send-command "say 日次バックアップ及びメンテナンスを実施します"
    sleep 5
    
    wait_for_pod
    echo "📢 30秒前アナウンス..."
    kubectl exec -n ${NAMESPACE} ${POD_NAME} -c bedrock -- send-command "say 30秒後にサーバーは再起動します。"
    sleep 25
    
    wait_for_pod
    echo "📢 5秒前アナウンス..."
    kubectl exec -n ${NAMESPACE} ${POD_NAME} -c bedrock -- send-command "say 再起動します"
    sleep 5
    
    # 2. グレースフルシャットダウン
    echo "🛑 サーバー停止コマンド送信..."
    kubectl exec -n ${NAMESPACE} ${POD_NAME} -c bedrock -- send-command stop || true
    sleep 10
    
    # 3. バックアップ（スケールダウンして実施）
    echo "📉 スケールダウン中..."
    kubectl scale deployment ${DEPLOYMENT_NAME} -n ${NAMESPACE} --replicas=0
    kubectl wait --for=delete pod/${POD_NAME} -n ${NAMESPACE} --timeout=60s || true
    
    DATE_STR=$(date +%Y-%m-%d)
    TAR_FILE="/tmp/${DATE_STR}.tar.gz"
    echo "📦 データ圧縮中: ${TAR_FILE}"
    cd /data
    tar -czf "${TAR_FILE}" worlds permissions.json server.properties allowlist.json 2>/dev/null || true
    
    # 4. サーバー復旧
    echo "📈 スケールアップ中..."
    kubectl scale deployment ${DEPLOYMENT_NAME} -n ${NAMESPACE} --replicas=1
    # トラップを解除（成功時はEXITトラップでの強制スケールアップを防ぐため、または正常終了として扱う）
    trap - ERR EXIT
    
    # 5. MinIOへアップロード
    if [ -s "${TAR_FILE}" ]; then
      echo "✅ 圧縮完了 ($(ls -lh ${TAR_FILE} | awk '{print $5}'))"
      MINIO_URL="http://${ACCESS_IP}:9000"
      mc alias set myminio "${MINIO_URL}" "${ACCESSKEY}" "${SECRETKEY}" >/dev/null 2>&1
      
      TAR_FILENAME=$(basename "${TAR_FILE}")
      echo "☁️ MinIOへアップロード中..."
      if mc cp "${TAR_FILE}" "myminio/${BUCKETNAME}/${TAR_FILENAME}" > /dev/null; then
        echo "✅ アップロード成功"
        rm -f "${TAR_FILE}"
        echo "🧹 8日以前のバックアップを削除中..."
        mc rm --older-than 8d --force "myminio/${BUCKETNAME}/" > /dev/null || true
      else
        echo "❌ アップロード失敗"
        exit 1
      fi
    else
      echo "⚠️ バックアップファイルが空または作成されませんでした。"
    fi
    
    echo "🎉 全ての工程が完了しました。"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bedrock-backup-cronjob
  namespace: minecraft
  labels:
    app.kubernetes.io/name: bedrock-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
spec:
  schedule: "0 19 * * *" # 19:00 UTC = 04:00 JST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: bedrock-backup
            app.kubernetes.io/component: cronjob
        spec:
          serviceAccountName: bedrock-backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:latest
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: ACCESS_IP
                  valueFrom:
                    secretKeyRef:
                      name: bedrock-backup-secret
                      key: ACCESS_IP
                - name: ACCESSKEY
                  valueFrom:
                    secretKeyRef:
                      name: bedrock-backup-secret
                      key: ACCESSKEY
                - name: SECRETKEY
                  valueFrom:
                    secretKeyRef:
                      name: bedrock-backup-secret
                      key: SECRETKEY
                - name: BUCKETNAME
                  valueFrom:
                    secretKeyRef:
                      name: bedrock-backup-secret
                      key: BUCKETNAME
              volumeMounts:
                - name: script-volume
                  mountPath: /scripts
                - name: data
                  mountPath: /data
          volumes:
            - name: script-volume
              configMap:
                name: bedrock-backup-script-cm
                defaultMode: 0755
            - name: data
              persistentVolumeClaim:
                claimName: pvc-bedrock
