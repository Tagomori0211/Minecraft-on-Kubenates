# ============================================================
# TAK Pipeline - BigQuery Metrics Insert CronJob
# ============================================================
# 15 分ごとに VictoriaMetrics の recording rule 結果を BigQuery に INSERT する。
#
# 前提条件（手動作成が必要）:
#   1. Terraform apply で minecraft_monitoring.tf をデプロイ済み
#   2. 以下のコマンドで k8s Secret を作成済みであること:
#        terraform output -raw mc_monitoring_writer_key \
#          | base64 -d > /tmp/mc-monitoring-sa.json
#        kubectl create secret generic bq-writer-sa-key \
#          -n monitoring-prometheus \
#          --from-file=key.json=/tmp/mc-monitoring-sa.json
#        rm /tmp/mc-monitoring-sa.json
#
# データフロー:
#   vmalert (15m) → VictoriaMetrics → [このCronJob] → BigQuery
# ============================================================

# ============================================================
# Python スクリプト ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: bq-metrics-script-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "bq-metrics-insert"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
data:
  insert_metrics.py: |-
    #!/usr/bin/env python3
    """VictoriaMetrics の recording rule 結果を BigQuery にストリーミング INSERT する。"""
    import json
    import os
    import subprocess
    import tempfile
    import urllib.parse
    import urllib.request
    from datetime import datetime, timezone


    def _load_project_id() -> str:
        """SA key JSON の project_id フィールドから GCP プロジェクト ID を取得する。"""
        creds_path = os.environ.get("GOOGLE_APPLICATION_CREDENTIALS", "")
        if creds_path:
            with open(creds_path) as f:
                return json.load(f)["project_id"]
        return os.environ["BQ_PROJECT"]


    VM_URL = os.environ.get("VM_URL", "http://victoria-metrics-service:8428")
    BQ_PROJECT = _load_project_id()
    BQ_TABLE = "minecraft_monitoring.server_metrics"

    # vmalert が生成する 15 分集計 recording rules
    METRICS = [
        "mc:players_online:avg15m",
        "mc:players_online:max15m",
        "mc:tps:avg15m",
        "mc:tps:min15m",
        "mc:jvm_memory_used_bytes:avg15m",
    ]


    def query_vm(metric: str) -> list:
        """VictoriaMetrics HTTP API から instant query を実行して結果を返す。"""
        url = f"{VM_URL}/api/v1/query?query={urllib.parse.quote(metric)}"
        try:
            with urllib.request.urlopen(url, timeout=10) as resp:
                return json.loads(resp.read()).get("data", {}).get("result", [])
        except Exception as e:
            print(f"[WARN] VM query failed for {metric}: {e}", flush=True)
            return []


    def main() -> None:
        ts = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
        rows = []

        for metric in METRICS:
            for r in query_vm(metric):
                server = r["metric"].get("component", "unknown")
                raw = r.get("value", [None, None])[1]
                # NoData（サーバー停止中・Bedrock の mc_tps 未対応等）はスキップ
                if raw is None or raw == "NaN":
                    continue
                rows.append({
                    "timestamp": ts,
                    "player_hash": None,    # 将来のプレイヤー粒度メトリクス用（現在 NULL）
                    "server": server,
                    "metric_name": metric,
                    "value": float(raw),
                })

        print(f"[{ts}] {len(rows)} rows collected from VictoriaMetrics", flush=True)
        if not rows:
            return

        with tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False) as f:
            for row in rows:
                f.write(json.dumps(row) + "\n")
            tmpfile = f.name

        try:
            proc = subprocess.run(
                ["bq", "insert", f"--project_id={BQ_PROJECT}", BQ_TABLE, tmpfile],
                capture_output=True,
                text=True,
            )
            if proc.returncode != 0:
                print(f"[ERROR] bq insert failed: {proc.stderr}", flush=True)
                raise SystemExit(1)
            print(
                f"[{ts}] Inserted {len(rows)} rows → {BQ_PROJECT}:{BQ_TABLE}",
                flush=True,
            )
        finally:
            os.unlink(tmpfile)


    if __name__ == "__main__":
        main()

---
# ============================================================
# CronJob: 15 分ごとに BQ INSERT
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bq-metrics-insert
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "bq-metrics-insert"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  # 15 分刻み（vmalert の recording rule 評価間隔に合わせる）
  schedule: "*/15 * * * *"
  # 前回の Job が終わっていない場合は新しい Job をスキップ
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 一時的なネットワーク障害等に備えて最大 2 回リトライ
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: "bq-metrics-insert"
        spec:
          nodeSelector:
            node-role.kubernetes.io/monitoring: "true"
          restartPolicy: OnFailure
          containers:
            - name: bq-insert
              # google/cloud-sdk:slim には bq CLI と Python3 が同梱されている
              image: google/cloud-sdk:slim
              command: ["python3", "/scripts/insert_metrics.py"]
              env:
                - name: VM_URL
                  value: "http://victoria-metrics-service:8428"
                # project_id は SA key JSON から自動取得するため明示不要だが念のため設定
                - name: BQ_PROJECT
                  value: ""   # SA key JSON に project_id が含まれるため通常は不要
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: "/var/secrets/google/key.json"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts/
                - name: sa-key
                  mountPath: /var/secrets/google/
                  readOnly: true
              resources:
                requests: { memory: "128Mi", cpu: "50m" }
                limits: { memory: "256Mi", cpu: "200m" }
          volumes:
            - name: scripts
              configMap:
                name: bq-metrics-script-cm
                defaultMode: 0755
            - name: sa-key
              secret:
                secretName: bq-writer-sa-key
