# ============================================================
# TAK Pipeline - vmagent (オンプレ k3s)
# ============================================================
# VictoriaMetrics と Grafana は GCE mc-monitoring-1 に移行済み。
# vmagent のみ k3s 内に残し:
#   - Kubernetes サービスディスカバリ（nodes / cAdvisor）
#   - Minecraft メトリクスのスクレイプ（ClusterIP DNS 名）
#   - remote_write で GCE VictoriaMetrics に転送
#
# ⚠️ remote_write.url の MONITORING_TAILSCALE_IP は
#   mc-monitoring-1 起動後に以下で確認して差し替えること:
#   gcloud compute ssh mc-monitoring-1 --zone=asia-northeast1-b \
#     --tunnel-through-iap --command='tailscale ip -4'
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "monitoring-prometheus"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"

---
# ============================================================
# vmagent スクレイプ設定
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmagent"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
data:
  vmagent.yml: |-
    global:
      scrape_interval: 15s

    scrape_configs:
      # ── Minecraft サーバー（ClusterIP DNS 名）─────────────────
      - job_name: 'lobby'
        static_configs:
          - targets: ['svc-lobby.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: lobby }

      - job_name: 'survival'
        static_configs:
          - targets: ['svc-survival.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: survival }

      - job_name: 'mod'
        static_configs:
          - targets: ['svc-mod.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: mod }

      - job_name: 'bedrock'
        static_configs:
          - targets: ['svc-bedrock.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: bedrock }

      # ── Kubernetes Nodes ───────────────────────────────────
      - job_name: 'kubernetes-nodes'
        scrape_interval: 30s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # ── cAdvisor ──────────────────────────────────────────
      - job_name: 'kubernetes-cadvisor'
        scrape_interval: 30s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - target_label: location
            replacement: onprem

---
# ============================================================
# vmagent Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmagent"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "vmagent"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "vmagent"
    spec:
      serviceAccountName: vm-sa
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.115.0
          args:
            - "-promscrape.config=/etc/vmagent/vmagent.yml"
            # ⚠️ MONITORING_TAILSCALE_IP を実際の IP に差し替えること
            - "-remoteWrite.url=http://MONITORING_TAILSCALE_IP:8428/api/v1/write"
            - "-promscrape.suppressDuplicateScrapeTargetErrors"
            - "-remoteWrite.queues=2"
          volumeMounts:
            - name: vmagent-config
              mountPath: /etc/vmagent/
            - name: vmagent-wal
              mountPath: /tmp/vmagent-wal
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "500m" }
      volumes:
        - name: vmagent-config
          configMap:
            name: vmagent-cm
        - name: vmagent-wal
          emptyDir: {}
