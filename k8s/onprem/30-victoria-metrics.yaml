# ============================================================
# TAK Pipeline - VictoriaMetrics Monitoring Stack (On-Premise k3s)
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "monitoring-prometheus"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"

---
# ============================================================
# VictoriaMetrics Storage (PVC)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-storage-pvc
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "victoria-metrics"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
# ============================================================
# vmagent ConfigMap（スクレイプ設定）
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmagent"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
data:
  vmagent.yml: |-
    global:
      scrape_interval: 1s   # リアルタイム性重視

    scrape_configs:
      # ── Velocity (GCE Proxy) ────────────────────────────────
      # Spark プラグイン未設定のため無効。有効化時はポートを確認して追加すること。
      # - job_name: 'velocity'
      #   static_configs:
      #     - targets: ['100.124.222.31:9090']   # GCE Tailscale IP
      #       labels: { location: gce, component: velocity }

      # ── Minecraft サーバー（オンプレミス ClusterIP）──────────
      - job_name: 'lobby'
        static_configs:
          - targets: ['svc-lobby.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: lobby }

      - job_name: 'survival'
        static_configs:
          - targets: ['svc-survival.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: survival }

      - job_name: 'mod'
        static_configs:
          - targets: ['svc-mod.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: mod }

      - job_name: 'bedrock'
        static_configs:
          - targets: ['svc-bedrock.minecraft.svc.cluster.local:8080']
            labels: { location: onprem, component: bedrock }

      # ── Kubernetes Nodes / cAdvisor（APIサーバー負荷を考慮し 15s）──
      - job_name: 'kubernetes-nodes'
        scrape_interval: 15s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      - job_name: 'kubernetes-cadvisor'
        scrape_interval: 15s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - target_label: location
            replacement: onprem

---
# ============================================================
# Grafana Datasource ConfigMap（自動プロビジョニング）
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-cm
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "grafana"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
data:
  datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoria-metrics-service:8428
        isDefault: true
        access: proxy

---
# ============================================================
# VictoriaMetrics Deployment（Single Node）
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "victoria-metrics"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "victoria-metrics"
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "victoria-metrics"
    spec:
      nodeSelector:
        node-role.kubernetes.io/monitoring: "true"
      securityContext:
        fsGroup: 1000
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:latest
          args:
            - "-storageDataPath=/victoria-metrics"
            - "-retentionPeriod=30d"
            - "-httpListenAddr=:8428"
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: victoria-metrics-storage
              mountPath: /victoria-metrics
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1Gi", cpu: "1000m" }
      volumes:
        - name: victoria-metrics-storage
          persistentVolumeClaim:
            claimName: victoria-metrics-storage-pvc

---
# ============================================================
# vmagent Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "vmagent"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "vmagent"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "vmagent"
    spec:
      serviceAccountName: vm-sa
      nodeSelector:
        node-role.kubernetes.io/monitoring: "true"
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:latest
          args:
            - "-promscrape.config=/etc/vmagent/vmagent.yml"
            - "-remoteWrite.url=http://victoria-metrics-service:8428/api/v1/write"
            - "-promscrape.suppressDuplicateScrapeTargetErrors"
          volumeMounts:
            - name: vmagent-config
              mountPath: /etc/vmagent/
            - name: vmagent-wal
              mountPath: /tmp/vmagent-wal
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
      volumes:
        - name: vmagent-config
          configMap:
            name: vmagent-cm
        - name: vmagent-wal
          emptyDir: {}

---
# ============================================================
# Grafana Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "grafana"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "grafana"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "grafana"
    spec:
      nodeSelector:
        node-role.kubernetes.io/monitoring: "true"
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_SERVER_ROOT_URL
              value: "http://tak-grafana-onprem"
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi", cpu: "500m" }
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-datasource-cm

---
# ============================================================
# Services
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics-service
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "victoria-metrics"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  selector:
    app.kubernetes.io/name: "victoria-metrics"
  type: NodePort
  ports:
    - port: 8428
      targetPort: 8428
      nodePort: 30428
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring-prometheus
  labels:
    app.kubernetes.io/name: "grafana"
    app.kubernetes.io/component: "monitoring"
    app.kubernetes.io/managed-by: "kubectl"
    env: "prod"
spec:
  selector:
    app.kubernetes.io/name: "grafana"
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
