apiVersion: v1
kind: ServiceAccount
metadata:
  name: gcs-backup-sa
  namespace: minecraft
  labels:
    app.kubernetes.io/name: gcs-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gcs-backup-role
  namespace: minecraft
  labels:
    app.kubernetes.io/name: gcs-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gcs-backup-rolebinding
  namespace: minecraft
  labels:
    app.kubernetes.io/name: gcs-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gcs-backup-role
subjects:
  - kind: ServiceAccount
    name: gcs-backup-sa
    namespace: minecraft
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcs-backup-script-cm
  namespace: minecraft
  labels:
    app.kubernetes.io/name: gcs-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail

    NAMESPACE="minecraft"
    DATE_STR=$(date +%Y-%m-%d)
    BUCKET="gs://sushiski-mc-backups"
    ALL_DEPLOYS="deploy-survival deploy-lobby deploy-mod deploy-bedrock"

    # kubectl インストール（google/cloud-sdk:slim には含まれないため取得）
    echo "→ kubectl インストール中..."
    K8S_VER=$(curl -sL https://dl.k8s.io/release/stable.txt)
    curl -sLo /usr/local/bin/kubectl \
      "https://dl.k8s.io/release/${K8S_VER}/bin/linux/amd64/kubectl"
    chmod +x /usr/local/bin/kubectl

    # gcloud 認証（コンテナ起動時は credential store が空のため明示的にセット）
    echo "→ gcloud 認証中..."
    gcloud auth login --cred-file=/secrets/gcs-key.json --quiet 2>/dev/null || true
    PROJECT_ID=$(gcloud config get project 2>/dev/null)
    SA_EMAIL="mc-proxy-sa@${PROJECT_ID}.iam.gserviceaccount.com"

    # Discord webhook URL を Secret Manager から取得（失敗時は空文字 = 通知スキップ）
    DISCORD_WEBHOOK=$(gcloud secrets versions access latest \
      --secret=mc-discord-webhook-url --project="${PROJECT_ID}" 2>/dev/null || echo "")
    [ -n "${DISCORD_WEBHOOK}" ] && echo "→ Discord webhook 取得済み" || echo "→ Discord webhook 未設定（通知スキップ）"

    # アップロード済みファイルの signed URL を保持（ファイル名 → URL）
    declare -A SIGNED_URLS

    # ============================================================
    # Discord 通知送信関数
    # ============================================================
    _send_discord_notification() {
      local STATUS=$1   # "success" | "failure"
      [ -z "${DISCORD_WEBHOOK}" ] && return 0

      local COLOR TITLE
      if [ "${STATUS}" = "success" ]; then
        COLOR=3066993; TITLE="📦 月次バックアップ ✅ 完了"
      else
        COLOR=15158332; TITLE="📦 月次バックアップ ❌ 失敗"
      fi

      # Python3 で Discord embed JSON を構築
      python3 - << PYEOF
import json, urllib.request, sys

webhook_url = "${DISCORD_WEBHOOK}"
date_str    = "${DATE_STR}"
status      = "${STATUS}"
color       = ${COLOR}
title       = "${TITLE}"

# 署名付き URL フィールドを構築
signed_urls = {}
$(for K in "${!SIGNED_URLS[@]}"; do echo "signed_urls['${K}'] = '${SIGNED_URLS[$K]}'"; done)

fields = []
for fname, url in sorted(signed_urls.items()):
    val = f"[ダウンロード]({url})" if url else "URL 生成失敗"
    fields.append({"name": fname, "value": val, "inline": False})

if status == "failure" and not fields:
    fields.append({"name": "詳細", "value": "スクリプト実行中にエラーが発生しました。", "inline": False})

embed = {
    "title": title,
    "description": f"{date_str} のバックアップ処理が完了しました。\n署名付き URL の有効期限: **7日間**",
    "color": color,
    "fields": fields,
}

payload = json.dumps({"embeds": [embed]}).encode()
req = urllib.request.Request(
    webhook_url, data=payload, headers={"Content-Type": "application/json"}
)
try:
    urllib.request.urlopen(req, timeout=10)
    print("Discord 通知送信完了", flush=True)
except Exception as e:
    print(f"Discord 通知失敗 (継続): {e}", flush=True)
PYEOF
    }

    # ============================================================
    # エラー時にサーバーを必ず復旧 + Discord 失敗通知
    # ============================================================
    ensure_scale_up() {
      echo "[TRAP] エラー発生: 全サーバーを復旧中..."
      for D in ${ALL_DEPLOYS}; do
        kubectl scale deployment "${D}" -n "${NAMESPACE}" --replicas=1 2>/dev/null || true
      done
      _send_discord_notification "failure" || true
    }
    trap 'ensure_scale_up' ERR

    # ============================================================
    # アナウンス送信関数（bedrock-restart スキルと同じ間隔）
    # ============================================================
    announce_server() {
      local SERVER=$1
      local MSG=$2
      local POD

      if [ "${SERVER}" = "bedrock" ]; then
        POD=$(kubectl get pods -n "${NAMESPACE}" -l app.kubernetes.io/component=bedrock \
          --no-headers -o custom-columns=':metadata.name' 2>/dev/null | head -1)
        [ -z "${POD}" ] && return 0
        kubectl exec -n "${NAMESPACE}" "${POD}" -c bedrock -- send-command "${MSG}" 2>/dev/null || true
      else
        POD=$(kubectl get pods -n "${NAMESPACE}" -l "app.kubernetes.io/name=${SERVER}" \
          --no-headers -o custom-columns=':metadata.name' 2>/dev/null | head -1)
        [ -z "${POD}" ] && return 0
        kubectl exec -n "${NAMESPACE}" "${POD}" -- rcon-cli "${MSG}" 2>/dev/null || true
      fi
    }

    echo "→ メンテナンスアナウンスを送信中..."
    for S in survival lobby mod bedrock; do
      announce_server "${S}" "say [月次バックアップ] 35秒後にサーバーを停止します"
    done
    sleep 5

    for S in survival lobby mod bedrock; do
      announce_server "${S}" "say 30秒後にサーバーは再起動します"
    done
    sleep 25

    for S in survival lobby mod bedrock; do
      announce_server "${S}" "say 再起動します"
    done
    sleep 5

    # グレースフルストップ
    echo "→ グレースフルストップを送信中..."
    for S in survival lobby mod; do
      POD=$(kubectl get pods -n "${NAMESPACE}" -l "app.kubernetes.io/name=${S}" \
        --no-headers -o custom-columns=':metadata.name' 2>/dev/null | head -1)
      [ -n "${POD}" ] && kubectl exec -n "${NAMESPACE}" "${POD}" -- rcon-cli "stop" 2>/dev/null || true
    done
    BEDROCK_POD=$(kubectl get pods -n "${NAMESPACE}" -l app.kubernetes.io/component=bedrock \
      --no-headers -o custom-columns=':metadata.name' 2>/dev/null | head -1)
    [ -n "${BEDROCK_POD}" ] && \
      kubectl exec -n "${NAMESPACE}" "${BEDROCK_POD}" -c bedrock -- send-command stop 2>/dev/null || true
    sleep 10

    # 全サーバーをスケールダウン
    echo "→ 全サーバーをスケールダウン中..."
    for D in ${ALL_DEPLOYS}; do
      kubectl scale deployment "${D}" -n "${NAMESPACE}" --replicas=0
      echo "  ${D}: replicas=0"
    done

    echo "→ Pod 終了待機中（60秒）..."
    sleep 60

    # ============================================================
    # Bedrock バックアップ
    # ============================================================
    BE_TAR="/tmp/${DATE_STR}_BE.tar.gz"
    echo "→ Bedrock バックアップ作成中: $(basename ${BE_TAR})"
    tar -czf "${BE_TAR}" \
      -C /data/bedrock \
      worlds \
      permissions.json \
      server.properties \
      allowlist.json \
      2>/dev/null || echo "  警告: Bedrock バックアップ対象ファイルが一部見つかりません"
    echo "  サイズ: $(du -sh ${BE_TAR} | cut -f1)"

    # ============================================================
    # Java バックアップ（サーバーごとに個別アーカイブ）
    # ============================================================
    for SERVER in survival lobby mod; do
      TAR_FILE="/tmp/${DATE_STR}_${SERVER}.tar.gz"
      echo "→ Java/${SERVER} バックアップ作成中: $(basename ${TAR_FILE})"

      ITEMS=()
      for ITEM in server.properties ops.json whitelist.json; do
        f="/data/${SERVER}/${ITEM}"
        [ -f "${f}" ] && ITEMS+=("${f}")
      done
      while IFS= read -r -d '' d; do
        ITEMS+=("${d}")
      done < <(find "/data/${SERVER}" -maxdepth 1 -name 'world*' -type d -print0 2>/dev/null)

      if [ "${#ITEMS[@]}" -gt 0 ]; then
        tar -czf "${TAR_FILE}" "${ITEMS[@]}"
        echo "  サイズ: $(du -sh ${TAR_FILE} | cut -f1)"
      else
        echo "  警告: /data/${SERVER} にバックアップ対象が見つかりません"
      fi
    done

    # 全サーバーをスケールアップ（GCS アップロード前に復旧してダウンタイムを最小化）
    echo "→ 全サーバーをスケールアップ中..."
    for D in ${ALL_DEPLOYS}; do
      kubectl scale deployment "${D}" -n "${NAMESPACE}" --replicas=1
      echo "  ${D}: replicas=1"
    done
    trap - ERR  # 正常スケールアップ後はトラップ解除

    # ============================================================
    # GCS アップロード + signed URL 生成（7日有効）
    # ============================================================
    echo "→ GCS にアップロード中 (${BUCKET})..."
    for TAR_FILE in \
      "/tmp/${DATE_STR}_BE.tar.gz" \
      "/tmp/${DATE_STR}_survival.tar.gz" \
      "/tmp/${DATE_STR}_lobby.tar.gz" \
      "/tmp/${DATE_STR}_mod.tar.gz"; do
      if [ -s "${TAR_FILE}" ]; then
        FNAME=$(basename "${TAR_FILE}")
        gsutil cp "${TAR_FILE}" "${BUCKET}/${FNAME}"
        echo "  完了: ${FNAME}"

        # mc-proxy-sa を使った V4 署名付き URL（7日有効）を生成
        SIGNED_URL=$(gcloud storage sign-url \
          --impersonate-service-account="${SA_EMAIL}" \
          --duration=7d \
          "${BUCKET}/${FNAME}" \
          --format="value(signedUrl)" 2>/dev/null || echo "")
        SIGNED_URLS["${FNAME}"]="${SIGNED_URL}"
        [ -n "${SIGNED_URL}" ] && echo "  署名済み URL 生成完了: ${FNAME}" || echo "  警告: URL 生成失敗 ${FNAME}"

        rm -f "${TAR_FILE}"
      else
        echo "  スキップ: ${TAR_FILE} が空または存在しません"
      fi
    done

    # ============================================================
    # Discord 完了通知
    # ============================================================
    _send_discord_notification "success"

    echo "✓ GCS バックアップ完了: ${DATE_STR}"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gcs-backup-cronjob
  namespace: minecraft
  labels:
    app.kubernetes.io/name: gcs-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/managed-by: kubectl
    env: prod
spec:
  schedule: "0 3 1 * *"  # 毎月1日 03:00 JST
  timeZone: "Asia/Tokyo"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gcs-backup
            app.kubernetes.io/component: cronjob
        spec:
          serviceAccountName: gcs-backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: google/cloud-sdk:slim
              command: ["/bin/bash", "/scripts/backup.sh"]
              env:
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /secrets/gcs-key.json
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: script-volume
                  mountPath: /scripts
                  readOnly: true
                - name: gcs-credentials
                  mountPath: /secrets
                  readOnly: true
                - name: data-bedrock
                  mountPath: /data/bedrock
                  readOnly: true
                - name: data-survival
                  mountPath: /data/survival
                  readOnly: true
                - name: data-lobby
                  mountPath: /data/lobby
                  readOnly: true
                - name: data-mod
                  mountPath: /data/mod
                  readOnly: true
          volumes:
            - name: script-volume
              configMap:
                name: gcs-backup-script-cm
                defaultMode: 0755
            - name: gcs-credentials
              secret:
                secretName: gcs-backup-credentials
                items:
                  - key: key.json
                    path: gcs-key.json
            - name: data-bedrock
              persistentVolumeClaim:
                claimName: pvc-bedrock
            - name: data-survival
              persistentVolumeClaim:
                claimName: pvc-survival
            - name: data-lobby
              persistentVolumeClaim:
                claimName: pvc-lobby
            - name: data-mod
              persistentVolumeClaim:
                claimName: pvc-mod
