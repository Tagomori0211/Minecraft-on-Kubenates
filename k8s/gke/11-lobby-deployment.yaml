# ============================================================
# TAK Pipeline - Lobby Server Deployment (GKE Autopilot)
# ============================================================
# コンテナ構成:
#   minecraft  : Paper Lobby Server (25566/TCP)
#   tailscale  : Tailscale Sidecar (Lobby <--> Tailscale VPN)
#   mc-monitor : Prometheus Exporter (8080/TCP)
#
# Spot Podで低コスト運用。ステートレス設計。
# Velocity --> Lobby --> プレイヤー待機
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobby
  namespace: minecraft
  labels:
    app: mc-lobby
    app.kubernetes.io/component: lobby
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-lobby
  template:
    metadata:
      labels:
        app: mc-lobby
        app.kubernetes.io/component: lobby
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # ── Spot Pod（コスト最優先）──────────────────────────────
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      terminationGracePeriodSeconds: 30

      # ── Init: paper-global.yml 生成（Velocity forwarding設定）─
      initContainers:
        - name: inject-velocity-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /data/config
              cat > /data/config/paper-global.yml << EOF
              proxies:
                velocity:
                  enabled: true
                  online-mode: true
                  secret: "${VELOCITY_SECRET}"
              EOF
          env:
            - name: VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-secret
                  key: velocity-forwarding-secret
          volumeMounts:
            - name: lobby-data
              mountPath: /data

      containers:
        # ── Minecraft Lobby (Paper) ─────────────────────────────
        - name: minecraft
          image: itzg/minecraft-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TYPE, value: "PAPER" }
            - { name: VERSION, value: "1.21.4" }
            - { name: MEMORY, value: "512M" }
            - { name: MAX_MEMORY, value: "512M" }
            - { name: ONLINE_MODE, value: "FALSE" } # Velocity proxy経由
            - { name: ENABLE_QUERY, value: "true" }
            - { name: DIFFICULTY, value: "peaceful" }
            - { name: GAMEMODE, value: "adventure" }
            - { name: SPAWN_PROTECTION, value: "0" }
            - { name: MAX_PLAYERS, value: "100" }
            - { name: SERVER_PORT, value: "25566" }
            - name: JVM_XX_OPTS
              value: >-
                -XX:+UseG1GC
                -XX:+ParallelRefProcEnabled
                -XX:MaxGCPauseMillis=200
                -Daikars.new.flags=true
          ports:
            - containerPort: 25566
              name: minecraft
          volumeMounts:
            - name: lobby-data
              mountPath: /data
          resources:
            requests: { memory: "512Mi", cpu: "100m" }
            limits: { memory: "1Gi", cpu: "1000m" }
          startupProbe:
            tcpSocket: { port: 25566 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: 25566 }
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mc-health"]
            initialDelaySeconds: 60
            periodSeconds: 10

        # ── Tailscale Sidecar ───────────────────────────────────
        # Lobby <--> Tailscale VPN (infrastructure.mermaid)
        - name: tailscale
          image: tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_USERSPACE
              value: "true"
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            - name: TS_HOSTNAME
              value: "tak-lobby-gke"
            - name: TS_EXTRA_ARGS
              value: "--accept-routes"
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "tailscale logout"]
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'tailscale status --json | grep "\"BackendState\"" | grep -q Running'
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

        # ── mc-monitor（Prometheus Exporter）───────────────────
        # Prometheus -->|監視| Lobby (infrastructure.mermaid)
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:25566" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: lobby-data
          emptyDir:
            sizeLimit: 2Gi
        - name: tailscale-state
          emptyDir: {}
