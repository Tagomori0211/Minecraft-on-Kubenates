# ============================================================
# TAK Pipeline - Lobby Server Deployment (GKE Autopilot)
# ============================================================
# コンテナ構成:
#   minecraft  : Paper Lobby Server (25566/TCP)
#   tailscale  : Tailscale Sidecar (Lobby <--> Tailscale VPN)
#   mc-monitor : Prometheus Exporter (8080/TCP)
#
# Spot Podで低コスト運用。ステートレス設計。
# Velocity --> Lobby --> プレイヤー待機
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobby
  namespace: minecraft
  labels:
    app: mc-lobby
    app.kubernetes.io/component: lobby
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mc-lobby
  template:
    metadata:
      labels:
        app: mc-lobby
        app.kubernetes.io/component: lobby
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # ── Spot Pod（コスト最優先）──────────────────────────────
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      terminationGracePeriodSeconds: 30

      # ── Init: paper-global.yml 生成（Velocity forwarding設定）─
      initContainers:
        - name: inject-velocity-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /data/config
              cat > /data/config/paper-global.yml << EOF
              proxies:
                velocity:
                  enabled: true
                  online-mode: true
                  secret: "${VELOCITY_SECRET}"
              EOF
              echo -n "${VELOCITY_SECRET}" > /data/forwarding.secret
              echo -n "${VELOCITY_SECRET}" > /data/velocity.secret
          env:
            - name: VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-secret
                  key: velocity-forwarding-secret
          volumeMounts:
            - name: lobby-data
              mountPath: /data

      containers:
        # ── Minecraft Lobby (Paper) ─────────────────────────────
        - name: minecraft
          image: itzg/minecraft-server:latest
          env:
            - { name: EULA, value: "TRUE" }
            - { name: TYPE, value: "NEOFORGE" }
            - { name: NEOFORGE_VERSION, value: "21.1.222" }
            - { name: MODRINTH_ALLOWED_VERSION_TYPE, value: "alpha" }
            - { name: VERSION, value: "1.21.1" }
            - { name: MODRINTH_PROJECTS, value: "neoforged-velocity-support,yungs-api,terrablender,architectury-api,geckolib,yungs-better-nether-fortresses,yungs-better-dungeons,yungs-better-jungle-temples,yungs-better-ocean-monuments,yungs-better-mineshafts,yungs-better-end-island,yungs-better-strongholds,yungs-better-witch-huts,yungs-better-desert-temples,yungs-extras,yungs-better-caves,yungs-cave-biomes,farmers-delight,sophisticated-backpacks,sophisticated-core,waystones,handcrafted,resourceful-lib,chipped,torchmaster,aquaculture,aquaculture-delight,ends-delight,expanded-delight,my-nethers-delight,more-delight,brewin-and-chewin,crabbers-delight,rustic-delight,trailtales-delight,cultural-delights,mekanism,mekanism-additions,mekanism-generators,mekanism-tools,trash-cans,ae2,applied-energistics-2-wireless-terminals,applied-mekanistics,botany-pots,botany-trees,mekanismmoremachine,mekanism-lasers,mekanism_extra,evolved-mekanism,cosmetic-armor-reworked-forked,carry-on,gravestone-mod" }
            - { name: MODS, value: "https://www.curseforge.com/api/v1/mods/227639/files/7797302/download" }
            - { name: MODRINTH_DOWNLOAD_DEPENDENCIES, value: "REQUIRED" }
            - { name: CF_PROJECTS, value: "306345,543592" }
            - { name: CF_DOWNLOAD_DEPENDENCIES, value: "REQUIRED" }
            - { name: CF_ALLOWED_VERSION_TYPE, value: "alpha" }
            - { name: MEMORY, value: "8G" }
            - { name: MAX_MEMORY, value: "8G" }
            - { name: ONLINE_MODE, value: "FALSE" } # Velocity proxy経由
            - { name: ENABLE_QUERY, value: "true" }
            - { name: DIFFICULTY, value: "peaceful" }
            - { name: GAMEMODE, value: "adventure" }
            - { name: SPAWN_PROTECTION, value: "0" }
            - { name: MAX_PLAYERS, value: "100" }
            - { name: SERVER_PORT, value: "25566" }
            - name: JVM_XX_OPTS
              value: >-
                -XX:+UseG1GC
                -XX:+ParallelRefProcEnabled
                -XX:MaxGCPauseMillis=200
                -Daikars.new.flags=true
          ports:
            - containerPort: 25566
              name: minecraft
          volumeMounts:
            - name: lobby-data
              mountPath: /data
          resources:
            requests: { memory: "8Gi", cpu: "4000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
          startupProbe:
            tcpSocket: { port: 25566 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            tcpSocket: { port: 25566 }
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mc-health"]
            initialDelaySeconds: 60
            periodSeconds: 10

        # ── mc-monitor（Prometheus Exporter）───────────────────
        # Prometheus -->|監視| Lobby (infrastructure.mermaid)
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:25566" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: lobby-data
          emptyDir:
            sizeLimit: 2Gi
