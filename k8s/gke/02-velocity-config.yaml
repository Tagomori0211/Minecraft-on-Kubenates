# ============================================================
# TAK Pipeline - Velocity Proxy Configuration
# ============================================================
# Velocity設定ファイル（GKE Autopilot）
#
# 転送先:
#   lobby    → lobby:25566         (GKE内 ClusterIP)
#   survival → <tailscale-ip>:25565 (オンプレ Tailscale経由)
#   mod      → <tailscale-ip>:25565 (オンプレ Tailscale経由)
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: velocity-config
  namespace: minecraft
  labels:
    app.kubernetes.io/component: velocity
    app.kubernetes.io/part-of: tak-pipeline
data:
  velocity.toml: |
    bind = "0.0.0.0:25577"

    motd = "<gradient:#34a853:#4285f4>すしすきー</gradient> <gray>|</gray> <white>Minecraft Server</white>"
    show-max-players = 100

    # Mojang認証（オンラインモード）
    online-mode = true

    # Velocity native forwarding（Paper/Lobbyサーバー側でも要設定）
    player-info-forwarding-mode = "modern"
    forwarding-secret-file = "forwarding.secret"

    announce-forge = true
    kick-existing-players = false
    ping-passthrough = "DISABLED"
    enable-player-address-logging = true

    [servers]
    # GKE内 Lobby（ClusterIP サービス名で接続）
    lobby = "lobby:25566"

    # オンプレミス Survival（Tailscale subnet-router 経由でk3s ClusterIPに到達）
    survival = "10.43.153.44:25565"

    # オンプレミス Java-Indicatory MOD（NeoForge）
    mod = "10.43.224.226:25565"

    # 接続時の最初のサーバー（フォールバック順）
    try = ["lobby"]

    [forced-hosts]
    # ドメイン別振り分け（例）
    # "survival.sushiski.example.com" = ["survival"]
    # "mod.sushiski.example.com"      = ["mod"]

    [advanced]
    compression-threshold = 256
    compression-level = -1
    connection-timeout = 5000
    read-timeout = 30000
    log-command-executions = false
    log-player-connections = true
    bungee-plugin-message-channel = true
    tcp-fast-open = true
    haproxy-protocol = false
    failover-on-unexpected-server-disconnect = true

    [query]
    enabled = false
    port = 25577

---
# ============================================================
# Paper側設定テンプレート（参考 / オンプレ側に適用）
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: paper-velocity-config-reference
  namespace: minecraft
  labels:
    app.kubernetes.io/part-of: tak-pipeline
    purpose: reference-only
data:
  paper-global.yml.example: |
    # オンプレミス側の Paper サーバー（Survival / Lobby）に適用する設定
    # velocity-secret と同じ値を使用すること
    proxies:
      velocity:
        enabled: true
        online-mode: true
        secret: "YOUR_VELOCITY_SECRET_HERE"
