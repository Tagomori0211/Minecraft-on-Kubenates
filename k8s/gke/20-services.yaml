# ============================================================
# TAK Pipeline - Services (GKE)
# ============================================================

---
# ============================================================
# Velocity LoadBalancer（外部公開 / Java版プレイヤー入口）
# ============================================================
# Player_Java -->|25565/TCP| Velocity (infrastructure.mermaid)
# velocity-lb は 20-nginx-gw.yaml に統合されました

---
# ============================================================
# Velocity ClusterIP/NodePort（内部通信 + Prometheus監視）
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: velocity-metrics
  namespace: minecraft
  labels:
    app: velocity
    app.kubernetes.io/name: "velocity-proxy"
    app.kubernetes.io/component: "proxy"
    app.kubernetes.io/managed-by: "terraform"
    env: "prod"
spec:
  type: NodePort
  selector:
    app: velocity
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: minecraft-internal
      port: 25577
      targetPort: 25577
