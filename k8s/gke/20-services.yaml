# ============================================================
# TAK Pipeline - Services (GKE)
# ============================================================

---
# ============================================================
# Velocity LoadBalancer（外部公開 / Java版プレイヤー入口）
# ============================================================
# Player_Java -->|25565/TCP| Velocity (infrastructure.mermaid)
apiVersion: v1
kind: Service
metadata:
  name: velocity-lb
  namespace: minecraft
  labels:
    app: velocity
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: tak-pipeline
  annotations:
    # Terraformで作成した固定IPを使用する場合はコメントを外す
    # networking.gke.io/load-balancer-ip-addresses: "tagomori-minecraft-ip"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: velocity
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25577
      protocol: TCP

---
# ============================================================
# Velocity ClusterIP（内部通信 + Prometheus監視）
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: velocity
  namespace: minecraft
  labels:
    app: velocity
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: tak-pipeline
spec:
  type: ClusterIP
  selector:
    app: velocity
  ports:
    - name: minecraft
      port: 25577
      targetPort: 25577
    - name: metrics
      port: 8080
      targetPort: 8080

---
# ============================================================
# Lobby ClusterIP
# ============================================================
# Velocity --> Lobby:25566 (ClusterIP)
# Prometheus --> Lobby:8080 (mc-monitor metrics)
apiVersion: v1
kind: Service
metadata:
  name: lobby
  namespace: minecraft
  labels:
    app: mc-lobby
    app.kubernetes.io/component: lobby
    app.kubernetes.io/part-of: tak-pipeline
spec:
  type: ClusterIP
  selector:
    app: mc-lobby
  ports:
    - name: minecraft
      port: 25566
      targetPort: 25566
    - name: metrics
      port: 8080
      targetPort: 8080
