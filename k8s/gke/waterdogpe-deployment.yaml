apiVersion: apps/v1
kind: Deployment
metadata:
  name: waterdogpe
  namespace: minecraft
  labels:
    app: waterdogpe
    app.kubernetes.io/component: proxy-bedrock
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waterdogpe
  template:
    metadata:
      labels:
        app: waterdogpe
    spec:
      # ── Init: Writable Config ────────────────────────────────
      initContainers:
        - name: init-waterdog-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              cp /tmp/config.yml /waterdog-data/config.yml
              chmod 666 /waterdog-data/config.yml
          volumeMounts:
            - name: config-readonly
              mountPath: /tmp/config.yml
              subPath: config.yml
            - name: waterdog-data
              mountPath: /waterdog-data

      containers:
        # --- WaterdogPE Proxy ---
        - name: waterdogpe
          image: ghcr.io/waterdogpe/waterdogpe:latest
          env:
            - { name: TYPE, value: "WATERDOGPE" }
            - { name: TZ, value: "Asia/Tokyo" }
          ports:
            - containerPort: 19132
              name: bedrock
              protocol: UDP
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          volumeMounts:
            - name: waterdog-data
              mountPath: /home/config.yml
              subPath: config.yml
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f waterdogpe || pgrep -f java"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f waterdogpe || pgrep -f java"]
            initialDelaySeconds: 30
            periodSeconds: 15

      volumes:
        - name: config-readonly
          configMap:
            name: waterdogpe-config
        - name: waterdog-data
          emptyDir: {}
