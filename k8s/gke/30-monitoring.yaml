# ============================================================
# TAK Pipeline - Monitoring Stack (GKE Autopilot)
# ============================================================
# Prometheus : Tailscale sidecar 経由で全コンポーネントを監視
# Grafana    : 管理者専用 / Tailscale 接続でのみアクセス可能
#
# 監視対象 (infrastructure.mermaid):
#   GKE内   : Velocity(:8080), Lobby(:8080)
#   オンプレ: Survival, Mod, Bedrock (Tailscale subnet-router 経由)
#   Kotlin API (AppServer) / Nginx (さくらVPS)
#
# アクセス方法:
#   Grafana → Admin が Tailscale 接続後 tak-grafana-gke:80 へアクセス
# ============================================================

---
# ============================================================
# Prometheus ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: tak-pipeline
data:
  prometheus.yml: |-
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      # ── GKE 内（ClusterIP DNS で直接到達）──────────────────
      - job_name: 'velocity'
        static_configs:
          - targets: ['velocity.minecraft.svc.cluster.local:8080']
            labels: { location: gke, component: velocity }

      - job_name: 'lobby'
        static_configs:
          - targets: ['lobby.minecraft.svc.cluster.local:8080']
            labels: { location: gke, component: lobby }

      # ── オンプレミス MinecraftServer（Tailscale subnet-router 経由）
      # subnet-router が 10.43.0.0/16 (k3s Service CIDR) を広告
      # 設定方法: オンプレ側で `kubectl get svc -n minecraft` を実行し
      #           ClusterIP を確認して以下の TODO を置換すること
      - job_name: 'survival'
        static_configs:
          - targets: ['10.43.0.10:8080']  # TODO: svc-survival の ClusterIP
            labels: { location: onprem, component: survival }

      - job_name: 'mod'
        static_configs:
          - targets: ['10.43.0.11:8080']  # TODO: svc-mod の ClusterIP
            labels: { location: onprem, component: mod }

      - job_name: 'bedrock'
        static_configs:
          - targets: ['10.43.0.12:8080']  # TODO: svc-bedrock-metrics の ClusterIP
            labels: { location: onprem, component: bedrock }

      # ── オンプレミス AppServer（Tailscale subnet-router 経由）──
      # AppServer の k3s は別クラスター (10.43.0.0/16 は共通CIDRだが別インスタンス)
      # AppServer 側のサブネットルーターが広告するCIDR上のIPを使用
      - job_name: 'kotlin_api'
        static_configs:
          - targets: ['10.43.1.10:8080']  # TODO: AppServer svc kotlin-api の ClusterIP
            labels: { location: onprem-app, component: kotlin-api }

      # ── さくらVPS Nginx（Tailscale 経由）────────────────────
      # Nginx で stub_status を有効化し nginx-prometheus-exporter を起動する必要あり
      # tailscale status で さくらVPSノードの Tailscale IP を確認して置換
      - job_name: 'nginx_sakura'
        static_configs:
          - targets: ['100.64.0.20:9113']  # TODO: さくらVPS の Tailscale IP
            labels: { location: sakura-vps, component: nginx-proxy }

---
# ============================================================
# Prometheus Deployment
# ============================================================
# 通常Pod（Spot 対象外 / メトリクス継続収集のため）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
              name: prometheus
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/
            - name: prometheus-storage
              mountPath: /prometheus/
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits:   { memory: "1Gi",   cpu: "1000m" }

        # Tailscale Sidecar: オンプレ監視ターゲットへのVPN接続
        # Prometheus <--> Tailscale <--> TS_Network (infrastructure.mermaid)
        - name: tailscale
          image: tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_USERSPACE
              value: "true"
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            - name: TS_HOSTNAME
              value: "tak-prometheus-gke"
            - name: TS_EXTRA_ARGS
              value: "--accept-routes"
          volumeMounts:
            - name: tailscale-state-prometheus
              mountPath: /var/lib/tailscale
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "200m" }

      volumes:
        - name: prometheus-config
          configMap:
            defaultMode: 420
            name: prometheus-server-conf
        - name: prometheus-storage
          emptyDir: {}
        - name: tailscale-state-prometheus
          emptyDir: {}

---
# ============================================================
# Prometheus Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
spec:
  selector:
    app.kubernetes.io/name: prometheus
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: prometheus

---
# ============================================================
# Grafana Tailscale Serve ConfigMap
# ============================================================
# Grafana を Tailscale ネットワーク上に HTTP で公開する設定
# Admin --> Tailscale接続 --> http://tak-grafana-gke:80 で Grafana にアクセス
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-tailscale-serve
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: tak-pipeline
data:
  serve-config.json: |
    {
      "TCP": {
        "80": {
          "HTTPS": false
        }
      },
      "Web": {
        "${TS_CERT_DOMAIN}:80": {
          "Handlers": {
            "/": {
              "Proxy": "http://127.0.0.1:3000"
            }
          }
        }
      }
    }

---
# ============================================================
# Grafana Deployment
# ============================================================
# 通常Pod（管理者専用）
# アクセス: Tailscale 接続後 → http://tak-grafana-gke で Grafana UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: grafana
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-password
                  optional: true   # Secret未設定時はデフォルト(admin)を使用
            - name: GF_SERVER_ROOT_URL
              value: "http://tak-grafana-gke"
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }

        # Tailscale Sidecar: 管理者が Tailscale 経由で Grafana にアクセス
        # Admin --> Tailscale接続 --> Grafana (infrastructure.mermaid)
        # serve-config.json により port 3000 を Tailscale ネットワーク上の port 80 に公開
        - name: tailscale
          image: tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_USERSPACE
              value: "true"
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            - name: TS_HOSTNAME
              value: "tak-grafana-gke"
            # serve-config.json のパスを指定 → Tailscale が自動的に HTTP サーブを設定
            - name: TS_SERVE_CONFIG
              value: "/tailscale-serve/serve-config.json"
          volumeMounts:
            - name: tailscale-state-grafana
              mountPath: /var/lib/tailscale
            - name: tailscale-serve-config
              mountPath: /tailscale-serve
              readOnly: true
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "200m" }

      volumes:
        - name: tailscale-state-grafana
          emptyDir: {}
        - name: tailscale-serve-config
          configMap:
            name: grafana-tailscale-serve

---
# ============================================================
# Grafana Service (ClusterIP - 外部公開しない)
# ============================================================
# 外部アクセスは Tailscale 経由のみ（LoadBalancer 不使用）
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: grafana
