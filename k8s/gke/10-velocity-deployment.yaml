# ============================================================
# TAK Pipeline - Velocity Proxy Deployment (GKE Autopilot)
# ============================================================
# コンテナ構成:
#   velocity   : Velocity Proxy (25577/TCP)
#   tailscale  : Tailscale Sidecar (オンプレへのVPN接続)
#   mc-monitor : Prometheus Exporter (8080/TCP)
#
# フロー: Internet → LB:25565 → Velocity:25577
#          Velocity → Lobby:25566 (GKE内)
#          Velocity → Tailscale → オンプレ Survival / Mod
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity
  namespace: minecraft
  labels:
    app: velocity
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velocity
  template:
    metadata:
      labels:
        app: velocity
        app.kubernetes.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      terminationGracePeriodSeconds: 30

      # ── Init: Config & forwarding.secret 生成 ─────────────────────────
      initContainers:
        - name: init-velocity-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo -n "${VELOCITY_SECRET}" > /velocity-data/forwarding.secret
              chmod 600 /velocity-data/forwarding.secret
              cp /tmp/velocity.toml /velocity-data/velocity.toml
          env:
            - name: VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-secret
                  key: velocity-forwarding-secret
          volumeMounts:
            - name: velocity-data
              mountPath: /velocity-data
            - name: velocity-config
              mountPath: /tmp/velocity.toml
              subPath: velocity.toml

      containers:
        # ── Velocity Proxy ──────────────────────────────────────
        - name: velocity
          image: itzg/bungeecord:latest
          env:
            - { name: TYPE, value: "VELOCITY" }
            - { name: VELOCITY_VERSION, value: "3.4.0-SNAPSHOT" }
            - { name: TZ, value: "Asia/Tokyo" }
            - { name: MEMORY, value: "256M" }
            - { name: INIT_MEMORY, value: "256M" }
            - { name: MAX_MEMORY, value: "256M" }
            - name: JVM_XX_OPTS
              value: >-
                -XX:+UseG1GC
                -XX:G1HeapRegionSize=4M
                -XX:+UnlockExperimentalVMOptions
                -XX:+ParallelRefProcEnabled
                -XX:+AlwaysPreTouch
          ports:
            - containerPort: 25577
              name: minecraft
              protocol: TCP
          volumeMounts:
            - name: velocity-data
              mountPath: /server
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "768Mi", cpu: "1000m" }
          startupProbe:
            tcpSocket: { port: 25577 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: 25577 }
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket: { port: 25577 }
            periodSeconds: 10
            failureThreshold: 3

        # ── mc-monitor（Prometheus Exporter）───────────────────
        # Prometheus -->|監視| Velocity (infrastructure.mermaid)
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:25577" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: velocity-config
          configMap:
            name: velocity-config
        - name: velocity-data
          emptyDir: {}
