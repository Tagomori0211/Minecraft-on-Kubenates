# ============================================================
# TAK Pipeline - Velocity Proxy Deployment (GKE Autopilot)
# ============================================================
# コンテナ構成:
#   velocity   : Velocity Proxy (25577/TCP)
#   tailscale  : Tailscale Sidecar (オンプレへのVPN接続)
#   mc-monitor : Prometheus Exporter (8080/TCP)
#
# フロー: Internet → LB:25565 → Velocity:25577
#          Velocity → Lobby:25566 (GKE内)
#          Velocity → Tailscale → オンプレ Survival / Mod
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity
  namespace: minecraft
  labels:
    app: velocity
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: tak-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velocity
  template:
    metadata:
      labels:
        app: velocity
        app.kubernetes.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # ── Spot Pod（コスト最優先）──────────────────────────────
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      terminationGracePeriodSeconds: 30

      # ── Init: forwarding.secret 生成 ─────────────────────────
      initContainers:
        - name: init-forwarding-secret
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo -n "${VELOCITY_SECRET}" > /velocity-data/forwarding.secret
              chmod 600 /velocity-data/forwarding.secret
          env:
            - name: VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-secret
                  key: velocity-forwarding-secret
          volumeMounts:
            - name: velocity-data
              mountPath: /velocity-data

      containers:
        # ── Velocity Proxy ──────────────────────────────────────
        - name: velocity
          image: itzg/bungeecord:latest
          env:
            - { name: TYPE, value: "VELOCITY" }
            - { name: VELOCITY_VERSION, value: "3.4.0-SNAPSHOT" }
            - { name: MEMORY, value: "512M" }
            - { name: INIT_MEMORY, value: "512M" }
            - { name: MAX_MEMORY, value: "512M" }
            - name: JVM_XX_OPTS
              value: >-
                -XX:+UseG1GC
                -XX:G1HeapRegionSize=4M
                -XX:+UnlockExperimentalVMOptions
                -XX:+ParallelRefProcEnabled
                -XX:+AlwaysPreTouch
          ports:
            - containerPort: 25577
              name: minecraft
              protocol: TCP
          volumeMounts:
            - name: velocity-config
              mountPath: /server/velocity.toml
              subPath: velocity.toml
            - name: velocity-data
              mountPath: /server/forwarding.secret
              subPath: forwarding.secret
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "768Mi", cpu: "1000m" }
          startupProbe:
            tcpSocket: { port: 25577 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: 25577 }
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket: { port: 25577 }
            periodSeconds: 10
            failureThreshold: 3

        # ── Tailscale Sidecar ───────────────────────────────────
        # オンプレの Survival / Mod サーバーへの VPN 接続
        - name: tailscale
          image: tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_USERSPACE
              value: "true" # GKE Autopilot はカーネルモード不可
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            - name: TS_HOSTNAME
              value: "tak-velocity-gke"
            - name: TS_EXTRA_ARGS
              value: "--accept-routes"
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'tailscale status --json | grep -q ''"BackendState":"Running"'''
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

        # ── mc-monitor（Prometheus Exporter）───────────────────
        # Prometheus -->|監視| Velocity (infrastructure.mermaid)
        - name: mc-monitor
          image: itzg/mc-monitor:latest
          args: ["export-for-prometheus"]
          env:
            - { name: EXPORT_SERVERS, value: "localhost:25577" }
            - { name: DEBUG, value: "false" }
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits: { memory: "64Mi", cpu: "100m" }

      volumes:
        - name: velocity-config
          configMap:
            name: velocity-config
        - name: velocity-data
          emptyDir: {}
        - name: tailscale-state
          emptyDir: {}
