---
# ============================================================
# TAK Pipeline - マニフェストデプロイ
# ============================================================
# infrastructure.mermaid に基づいてノード別に適用
#
#   minecraft (192.168.0.151):
#     backend-servers.yaml → Survival / Mod / Bedrock / Tailscale Router
#
#   app (192.168.0.150):
#     appserver.yaml → Kotlin API / Envoy / Flutter Web / CF Tunnel
# ============================================================

# ── MinecraftServer ノード ────────────────────────────────────
- name: Deploy Minecraft Game Servers
  hosts: minecraft
  become: yes

  vars:
    manifest_dir: /home/shinari/k8s_manifests
    manifest_src: "{{ playbook_dir }}/../k8s/onprem/backend-servers.yaml"
    manifest_file: backend-servers.yaml

  tasks:
    - name: Create manifests directory
      file:
        path: "{{ manifest_dir }}"
        state: directory
        owner: shinari
        group: shinari
        mode: "0755"

    - name: Copy backend-servers manifest
      copy:
        src: "{{ manifest_src }}"
        dest: "{{ manifest_dir }}/{{ manifest_file }}"
        owner: shinari
        group: shinari
        mode: "0644"

    - name: Apply backend-servers manifest
      command: k3s kubectl apply -f {{ manifest_dir }}/{{ manifest_file }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    - name: Show apply result
      debug:
        msg: "{{ apply_result.stdout_lines }}"

# ── AppServer ノード ──────────────────────────────────────────
- name: Deploy StatusPlatform
  hosts: app
  become: yes

  vars:
    manifest_dir: /home/shinari/k8s_manifests
    manifest_src: "{{ playbook_dir }}/../k8s/onprem/appserver.yaml"
    manifest_file: appserver.yaml

  tasks:
    - name: Create manifests directory
      file:
        path: "{{ manifest_dir }}"
        state: directory
        owner: shinari
        group: shinari
        mode: "0755"

    - name: Copy appserver manifest
      copy:
        src: "{{ manifest_src }}"
        dest: "{{ manifest_dir }}/{{ manifest_file }}"
        owner: shinari
        group: shinari
        mode: "0644"

    - name: Apply appserver manifest
      command: k3s kubectl apply -f {{ manifest_dir }}/{{ manifest_file }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    - name: Show apply result
      debug:
        msg: "{{ apply_result.stdout_lines }}"
