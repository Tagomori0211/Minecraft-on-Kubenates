---
- name: Install k3s agent and Tailscale on monitoring node
  hosts: monitoring
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - curl
          - iptables
        state: present

    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Ensure tailscaled service is running
      systemd:
        name: tailscaled
        state: started
        enabled: yes

    - name: Authenticate Tailscale
      shell: |
        tailscale up \
          --authkey="{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}" \
          --hostname=k3s-monitoring \
          --accept-routes=true
      args:
        creates: /var/lib/tailscale/tailscaled.state

    - name: Get K3s token from master
      command: ssh -o StrictHostKeyChecking=no shinari@192.168.0.151 "sudo cat /var/lib/rancher/k3s/server/node-token"
      register: k3s_token
      delegate_to: localhost
      run_once: true

    - name: Install K3s Agent
      shell: curl -sfL https://get.k3s.io | K3S_URL=https://192.168.0.151:6443 K3S_TOKEN={{ k3s_token.stdout }} sh -
      args:
        creates: /usr/local/bin/k3s-agent
