---
# ============================================================
# TAK Pipeline - k3s + Tailscale インストール
# ============================================================
# 対象ホスト (infrastructure.mermaid):
#   minecraft : オンプレ MinecraftServer ノード (192.168.0.151)
#   app       : オンプレ AppServer ノード       (192.168.0.150)
#
# 各ノードは独立した k3s シングルクラスター
# Tailscale で GKE と接続する
# ============================================================

- name: Install k3s and Tailscale
  hosts: minecraft,app
  become: yes

  tasks:

    # ── 前準備 ─────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - curl
          - iptables
        state: present

    # ── k3s インストール ────────────────────────────────────
    - name: Install k3s (single-node server)
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s   # 存在すればスキップ（冪等性）

    - name: Ensure k3s service is running
      systemd:
        name: k3s
        state: started
        enabled: yes

    # ── Tailscale インストール ──────────────────────────────
    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale   # 存在すればスキップ

    - name: Ensure tailscaled service is running
      systemd:
        name: tailscaled
        state: started
        enabled: yes

    # ── Tailscale 認証（ノード別に手動実行）────────────────
    # tailscale up は --advertise-routes のオプションが異なるため
    # 自動化せず手動で実行する（認証は一度だけ必要）
    - name: Show Tailscale auth instructions
      debug:
        msg: |
          =====================================================
          [Tailscale] 認証が必要です。各サーバーで実行してください:

          MinecraftServer (192.168.0.151):
            sudo tailscale up \
              --authkey=<TS_AUTHKEY> \
              --hostname=tak-onprem-mc \
              --advertise-routes=10.43.0.0/16

          AppServer (192.168.0.150):
            sudo tailscale up \
              --authkey=<TS_AUTHKEY> \
              --hostname=tak-onprem-app

          ※ Tailscale管理画面でサブネットルートを承認すること
          =====================================================
      when: inventory_hostname in groups['minecraft'] or inventory_hostname in groups['app']
