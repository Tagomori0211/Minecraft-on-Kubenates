---
- name: Setup k3s and Tailscale on Servers
  hosts: minecraft,app
  become: yes

  tasks:
    # 1. まずは下準備。apt update をしておきます
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600 # 1時間以内ならキャッシュを使って時短する

    # 2. 依存パッケージのインストール
    - name: Install dependencies (curl)
      apt:
        name: curl
        state: present

    # 3. k3sをインストールします（公式スクリプトを使用）
    # shellモジュールは強力ですが、毎回走ると遅いので条件を付けます
    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s # このファイルがあれば「インストール済み」とみなしてスキップする（冪等性の確保）

    # 4. サービスが起動しているか確認します
    - name: Ensure k3s service is running
      systemd:
        name: k3s
        state: started
        enabled: yes

    # ============================================================
    # Tailscale インストール
    # ============================================================
    # infrastructure.mermaid:
    #   MinecraftServer -- Tailscale Client (TS_Router_Sub)
    #   AppServer       -- Tailscale Client (CF Tunnel経由のため不要だが管理用に導入)

    # 5. Tailscaleの公式インストールスクリプトを実行
    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/sbin/tailscaled # インストール済みならスキップ

    # 6. tailscaledサービスを有効化・起動
    - name: Ensure tailscaled service is running
      systemd:
        name: tailscaled
        state: started
        enabled: yes

    # 7. Tailscale認証（tailscale up）はサーバーごとに異なるため手動実行
    # 手順: tailscale up --authkey=<TS_AUTHKEY> --hostname=<hostname>
    # MinecraftServer: tailscale up --authkey=<key> --hostname=tak-onprem-mc --advertise-routes=10.43.0.0/16
    # AppServer:       tailscale up --authkey=<key> --hostname=tak-onprem-app
    - name: Show Tailscale auth reminder
      debug:
        msg: |
          [Tailscale] 認証が必要です。各サーバーで以下を実行してください:
          MinecraftServer: tailscale up --authkey=<TS_AUTHKEY> --hostname=tak-onprem-mc --advertise-routes=10.43.0.0/16
          AppServer:       tailscale up --authkey=<TS_AUTHKEY> --hostname=tak-onprem-app
