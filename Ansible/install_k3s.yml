---
# ============================================================
# TAK Pipeline - k3s + Tailscale インストール
# ============================================================
# 対象ホスト (infrastructure.mermaid):
#   minecraft : オンプレ MinecraftServer ノード (192.168.0.151)
#   app       : オンプレ AppServer ノード       (192.168.0.150)
#
# 各ノードは独立した k3s シングルクラスター
# Tailscale で GKE と接続する
# ============================================================

- name: Install k3s and Tailscale
  hosts: minecraft
  become: yes

  tasks:
    # ── 前準備 ─────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - curl
          - iptables
        state: present

    # ── k3s インストール ────────────────────────────────────
    - name: Install k3s (single-node server)
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s # 存在すればスキップ（冪等性）

    - name: Ensure k3s service is running
      systemd:
        name: k3s
        state: started
        enabled: yes

    # ── Tailscale インストール ──────────────────────────────
    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale # 存在すればスキップ

    - name: Ensure tailscaled service is running
      systemd:
        name: tailscaled
        state: started
        enabled: yes

    # ── Tailscale 認証（自動化）────────────────
    - name: Authenticate Tailscale
      shell: |
        tailscale up \
          --authkey="{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}" \
          --hostname=tak-onprem-mc \
          --advertise-routes=10.43.0.0/16 \
          --accept-routes=true
      args:
        # tailscale status で認証済みか確認し、未認証なら実行
        creates: /var/lib/tailscale/tailscaled.state
