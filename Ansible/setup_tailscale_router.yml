---
# ============================================================
# TAK Pipeline - Tailscale Subnet Router Setup (GCE)
# ============================================================
# GKE Autopilot からオンプレ環境への接続を担保する VPC VM の設定
# ============================================================

- name: Configure Tailscale Subnet Router on GCE
  hosts: tailscale_routers
  become: yes

  tasks:
    - name: Wait for system to be ready
      wait_for_connection:
        timeout: 300

    - name: Download Tailscale install script
      get_url:
        url: https://tailscale.com/install.sh
        dest: /tmp/install_tailscale.sh
        mode: "0755"

    - name: Execute Tailscale install script
      command: /tmp/install_tailscale.sh
      args:
        creates: /usr/bin/tailscale

    - name: Enable IPv4 forwarding for Tailscale
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: yes
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        state: present
        reload: yes

    - name: Enable IPv6 forwarding for Tailscale
      sysctl:
        name: net.ipv6.conf.all.forwarding
        value: "1"
        sysctl_set: yes
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        state: present
        reload: yes

    - name: Start and enable Tailscale service
      systemd:
        name: tailscaled
        state: started
        enabled: yes

    # 注: 初回は手動または Auth Key での認証が必要
    # Auth Key がある場合は、以下のアクティベーションタスクを有効化
    # - name: Authenticate Tailscale and set up Subnet Router
    #   command: tailscale up --advertise-routes=100.64.0.0/10 --accept-routes --hostname=gke-subnet-router --authkey={{ tailscale_auth_key }}
    #   register: tailscale_status
    #   changed_when: false
