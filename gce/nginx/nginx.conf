# ============================================================
# TAK Pipeline - nginx stream proxy (GCE)
# ============================================================
# 1 プロセスで Java TCP 25565 と Bedrock UDP 19132 を処理
# ============================================================

user nginx;
worker_processes auto;
error_log /dev/stdout warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    log_format basic '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    access_log /dev/stdout basic;

    # ── Java Edition (Velocity host loopback) ─────────────
    server {
        listen 25565;
        proxy_pass 127.0.0.1:25577;
        proxy_timeout 10m;
        proxy_connect_timeout 30s;
    }

    # ── Bedrock Edition (Tailscale -> オンプレ k3s-worker) ──
    # RakNet の長セッションに耐えるため proxy_timeout を 1h に設定
    # proxy_responses を省略 = 上流からの応答を無制限にクライアントへ転送
    server {
        listen 19132 udp reuseport;
        proxy_pass 100.107.122.45:19132;
        proxy_timeout 1h;
    }
}
