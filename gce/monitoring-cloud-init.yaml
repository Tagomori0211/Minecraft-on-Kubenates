#cloud-config
# ============================================================
# TAK Pipeline - Monitoring VM (VictoriaMetrics + Grafana)
# ============================================================
# 実行内容（初回起動時のみ）:
#   1. Docker / docker-compose-plugin インストール
#   2. Tailscale インストール + Secret Manager 経由で auth_key 取得 → up
#      hostname: gce-mc-monitoring
#   3. リポジトリから gce/monitoring/ を /opt/mc-monitoring/ に配置
#   4. VictoriaMetrics + Grafana を Docker Compose で起動
#
# アクセス方法:
#   Grafana: gcloud compute ssh mc-monitoring-1 --zone=asia-northeast1-b \
#             --tunnel-through-iap -- -L 3000:localhost:3000
#            → http://localhost:3000 (admin / admin → 要変更)
#
# vmagent remote_write URL の確認:
#   gcloud compute ssh mc-monitoring-1 --zone=asia-northeast1-b \
#     --tunnel-through-iap --command='tailscale ip -4'
# ============================================================

package_update: true
package_upgrade: false

apt:
  sources:
    docker.list:
      source: "deb [arch=amd64 signed-by=$KEY_FILE] https://download.docker.com/linux/ubuntu noble stable"
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88
    tailscale.list:
      source: "deb [signed-by=$KEY_FILE] https://pkgs.tailscale.com/stable/ubuntu noble main"
      keyid: 2596A99EAAB33821893C0A79458CA832957F5868

packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - tailscale
  - git
  - jq

write_files:
  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": { "max-size": "10m", "max-file": "3" }
      }

  - path: /usr/local/bin/setup-swap.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e
      if [[ ! -f /swap.img ]]; then
        fallocate -l 1G /swap.img
        chmod 600 /swap.img
        mkswap /swap.img
        swapon /swap.img
        echo "/swap.img none swap sw 0 0" >> /etc/fstab
      fi

  - path: /usr/local/bin/tailscale-up.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if tailscale status --peers=false --json 2>/dev/null | jq -e '.BackendState=="Running"' > /dev/null; then
        echo "[tailscale-up] 既に Running 状態のため skip"
        exit 0
      fi
      AUTH_KEY="$(gcloud secrets versions access latest --secret=tailscale-auth-key)"
      tailscale up \
        --auth-key="${AUTH_KEY}" \
        --hostname=gce-mc-monitoring \
        --accept-routes \
        --ssh
      echo "[tailscale-up] Tailscale up 完了"
      echo "[tailscale-up] Tailscale IP: $(tailscale ip -4)"

runcmd:
  - /usr/local/bin/setup-swap.sh
  - systemctl restart docker
  - systemctl enable docker
  - systemctl enable --now tailscaled
  - /usr/local/bin/tailscale-up.sh

  # monitoring スタック配置
  - mkdir -p /opt/mc-monitoring
  - git clone --depth=1 https://github.com/Tagomori0211/Minecraft_java_k3s.git /tmp/repo
  - cp -r /tmp/repo/gce/monitoring/. /opt/mc-monitoring/
  - rm -rf /tmp/repo

  # Docker Compose で起動
  - docker compose -f /opt/mc-monitoring/compose.yaml up -d

  # 起動確認ログ
  - sleep 15
  - docker compose -f /opt/mc-monitoring/compose.yaml ps > /var/log/mc-monitoring-bootstrap.log 2>&1 || true
  - tailscale ip -4 >> /var/log/mc-monitoring-bootstrap.log 2>&1 || true
