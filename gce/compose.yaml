# ============================================================
# TAK Pipeline - Minecraft Proxy on GCE (Docker Compose)
# ============================================================
# ホストネットワークで socat TCP/UDP 透過転送
# Tailscale はホスト側 systemd で kernel mode 動作
#
# 接続フロー:
#   Java    : 35.200.78.252:25565/TCP --> socat-tcp  --> 100.107.122.45:30065 (Tailscale -> k3s survival)
#   Bedrock : 35.200.78.252:19132/UDP --> socat-bedrock --> 100.107.122.45:19132 (Tailscale -> k3s bedrock)
# ============================================================

services:
  # Java Edition TCP 透過転送 (socat)
  socat-tcp:
    image: alpine/socat:latest
    container_name: socat-tcp
    restart: unless-stopped
    network_mode: host
    command:
      - "TCP4-LISTEN:25565,fork,reuseaddr"
      - "TCP4:100.107.122.45:30065"

  # Bedrock RakNet は nginx UDP proxy では動作しないため socat で透過中継
  # fork オプションでクライアントごとに独立ソケットを生成し RakNet セッションを正しく維持
  socat-bedrock:
    image: alpine/socat:latest
    container_name: socat-bedrock
    restart: unless-stopped
    network_mode: host
    command:
      - "UDP4-LISTEN:19132,fork,reuseaddr"
      - "UDP4:100.107.122.45:19132"