#cloud-config
# ============================================================
# TAK Pipeline - Minecraft Proxy GCE 初期セットアップ
# ============================================================
# 実行内容（初回起動時のみ）:
#   1. Docker / docker-compose-plugin インストール
#   2. Tailscale インストール + Secret Manager 経由で auth_key 取得 → up
#   3. /opt/mc-proxy/ にリポジトリの gce/ 配下をクローン
#   4. systemd unit mc-proxy.service を有効化
#
# 前提:
#   - VM の SA に roles/secretmanager.secretAccessor 付与済み
#   - Secret Manager に tailscale-auth-key と velocity-forwarding-secret 登録済み
# ============================================================

package_update: true
package_upgrade: false

# Docker / Tailscale の APT リポジトリ
apt:
  sources:
    docker.list:
      source: "deb [arch=amd64 signed-by=$KEY_FILE] https://download.docker.com/linux/ubuntu noble stable"
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88
    tailscale.list:
      source: "deb [signed-by=$KEY_FILE] https://pkgs.tailscale.com/stable/ubuntu noble main"
      keyid: 2596A99EAAB33821893C0A79458CA832957F5868

packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - tailscale
  - git
  - jq
  - netcat-openbsd

write_files:
  # Docker のログローテーション設定
  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

  # swap 1GB を保険として確保
  - path: /usr/local/bin/setup-swap.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e
      if [[ ! -f /swap.img ]]; then
        fallocate -l 1G /swap.img
        chmod 600 /swap.img
        mkswap /swap.img
        swapon /swap.img
        echo "/swap.img none swap sw 0 0" >> /etc/fstab
      fi

  # Tailscale 起動（idempotent: 既に up なら skip）
  - path: /usr/local/bin/tailscale-up.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if tailscale status --peers=false --json 2>/dev/null | jq -e '.BackendState=="Running"' > /dev/null; then
        echo "[tailscale-up] 既に Running 状態のため skip"
        exit 0
      fi
      AUTH_KEY="$(gcloud secrets versions access latest --secret=tailscale-auth-key)"
      tailscale up \
        --auth-key="${AUTH_KEY}" \
        --hostname=gce-mc-proxy \
        --accept-routes \
        --ssh
      echo "[tailscale-up] Tailscale up 完了"

runcmd:
  # swap 設定
  - /usr/local/bin/setup-swap.sh

  # Docker daemon 再読み込み（log-opts 反映）
  - systemctl restart docker
  - systemctl enable docker

  # tailscaled 起動
  - systemctl enable --now tailscaled

  # Tailscale ログイン（Secret Manager 経由）
  - /usr/local/bin/tailscale-up.sh

  # mc-proxy 配置：リポジトリから gce/ 配下を取得
  - mkdir -p /opt/mc-proxy
  - git clone --depth=1 https://github.com/Tagomori0211/Minecraft_java_k3s.git /tmp/repo
  - cp -r /tmp/repo/gce/. /opt/mc-proxy/
  - rm -rf /tmp/repo

  # fetch-secrets.sh を /usr/local/bin に配置
  - install -m 0755 /opt/mc-proxy/systemd/fetch-secrets.sh /usr/local/bin/fetch-secrets.sh

  # systemd unit 配置
  - install -m 0644 /opt/mc-proxy/systemd/mc-proxy.service /etc/systemd/system/mc-proxy.service
  - systemctl daemon-reload
  - systemctl enable --now mc-proxy.service

  # 起動確認ログ
  - sleep 30
  - docker compose -f /opt/mc-proxy/compose.yaml ps > /var/log/mc-proxy-bootstrap.log 2>&1 || true
